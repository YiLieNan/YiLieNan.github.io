# ========================================
# Reimu 主题配置
# ========================================

# 菜单导航
menu:
  - name: home
    url: /
    icon: f015
  - name: 标签
    url: /tags
    icon: f02c
  - name: 学习
    url: /categories/学习/
    icon: f19d
  - name: 日常
    url: /categories/日常/
    icon: f0e7
  - name: about
    url: /about
    icon: f007
  - name: friend
    url: /friend
    icon: f2b5

# 打字机副标题
subtitle:
  typing:
    enable: true
    strings:
      - 记录学习，分享生活
      - 一个技术小白的小窝
      - (∠・ω< )⌒☆
    typeSpeed: 100
    backSpeed: 50
    backDelay: 2000
    startDelay: 300
    loop: true
    showCursor: true
    cursorChar: "|"

# 头图（背景切换覆盖，用背景图做头图）
banner: "/images/elaina-banner.webp"

# 头像（伊蕾娜）
avatar: "elaina-avatar.webp"

# 站点图标（伊蕾娜）
favicon: "/images/elaina-avatar.webp"

# 侧边栏
sidebar:
  position: right
  menu: true
  article:
    show_common: true

# 小部件
widgets:
  - category
  - tag
  - archive
  - recent_posts

# 社交链接
social:
  github: https://github.com/YiLieNan
  bilibili: https://space.bilibili.com/3546923170532238
  rss: /atom.xml
  # email: mailto:xxx@gmail.com
  # zhihu: https://www.zhihu.com/people/你的用户名

# 页脚
footer:
  since: 2026
  powered: true
  count: true
  busuanzi: true

# 目录
toc: true
toc_options:
  list_number: true
  min_depth: 1
  max_depth: 6

# 暗色模式 (自动跟随系统)
dark_mode:
  enable: auto

# 代码块默认展开
code_block:
  expand: true

# 文章摘要
summary:
  enable: true
  style: subtitle

# 评论系统 (先用 giscus, 基于 GitHub Discussion)
# 不需要服务器, 有 GitHub 即可
comment:
  title:
    zh-CN: 说些什么吧！
  default: giscus

giscus:
  enable: true
  repo: YiLieNan/YiLieNan.github.io
  repoId: R_kgDOSw6vgQ
  category: Announcements
  categoryId: DIC_kwDOSw6vgc4C-kPU
  mapping: pathname
  strict: 0
  reactionsEnabled: 1
  inputPosition: bottom

# 背景音乐（右下角浮动播放器）
player:
  disable_on_mobile: false
  position: before_sidebar
  aplayer:
    enable: true
    options:
      audio: []
      fixed: true
      autoplay: false
      loop: all
      order: random
      preload: auto
      volume: 0.7
      mutex: true
      listFolded: true
      lrcType: 0
  meting:
    enable: true
    options:
      id: 6759056661
      server: netease
      type: playlist

# 播放器拖拽 + 重定位
injector:
  body_end: '<script src="/js/player-drag.js"></script><script>function bindAvatar(){var a=document.querySelector(".sidebar-author img");if(a){a.style.cursor="pointer";a.onclick=function(){location.href="/about"}}}document.addEventListener("DOMContentLoaded",bindAvatar);document.addEventListener("pjax:complete",bindAvatar);</script>'

# Google Analytics
google_analytics: false

# Pjax（页面无刷新跳转，加快导航速度，播放器不重载）
pjax:
  enable: true

# Quicklink（预加载页面链接）
quicklink:
  enable: true
  timeout: 3000
  priority: true

# 自定义鼠标指针（伊蕾娜主题）
reimu_cursor:
  enable: true
  cursor:
    default: ../images/cursor/elaina-default.png
    pointer: ../images/cursor/elaina-pointer.png
    text: ../images/cursor/elaina-text.png
