# Injector
injector:
  body_begin: '<link rel="stylesheet" href="/css/mobile-optimize.css"><script type="application/ld+json">{"@context":"https://schema.org","@type":"Blog","name":"YiLieNan の 小屋","description":"YiLieNan 的个人博客，记录学习与生活","url":"https://yilienan.github.io"}</script>'
  body_end: '<script src="/js/player-drag.js"></script><script src="/js/mobile-optimize.js"></script><script>function bindAvatar(){var a=document.querySelector(".sidebar-author img");if(a){a.style.cursor="pointer";a.onclick=function(){location.href="/intro"}}}document.addEventListener("DOMContentLoaded",bindAvatar);document.addEventListener("pjax:complete",bindAvatar);</script>'

# Google Analytics
google_analytics: false

# Pjax（页面无刷新跳转，加快导航速度，播放器不重载）
pjax:
  enable: true

# Quicklink（预加载页面链接）
quicklink:
  enable: true
  timeout: 3000
  priority: true

# 自定义鼠标指针（伊蕾娜主题）
reimu_cursor:
  enable: true
  cursor:
    default: ../images/cursor/elaina-default.png
    pointer: ../images/cursor/elaina-pointer.png
    text: ../images/cursor/elaina-text.png
