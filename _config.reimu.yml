# ========================================
# Reimu 主题配置
# ========================================

# 菜单导航
menu:
  - name: home
    url: /
    icon: f015
  - name: 搜索
    url: /tags/
    icon: f002
  - name: 学习
    url: /categories/学习/
    icon: f19d
  - name: 日常
    url: /categories/日常/
    icon: f0e7
  - name: 关于
    url: /about/
    icon: f007
  - name: 介绍
    url: /intro/
    icon: f2b9
  - name: friend
    url: /friend/
    icon: f2b5

# 打字机副标题
subtitle:
  typing:
    enable: true
    strings:
      - 记录学习，分享生活
      - 一个技术小白的小窝
      - (∠・ω< )⌒☆
    typeSpeed: 100
    backSpeed: 50
    backDelay: 2000
    startDelay: 300
    loop: true
    showCursor: true
    cursorChar: "|"

# 头图（响应式：桌面8K壁纸001，手机壁纸004）
banner: "/images/elaina-banner-desktop.webp"
banner_srcset:
  enable: true
  srcset:
    - media: "(max-width: 479px)"
      src: "/images/banner-600w.webp"
    - media: "(max-width: 799px)"
      src: "/images/banner-800w.webp"
    - media: "(min-width: 800px)"
      src: "/images/banner.webp"

# 头像（伊蕾娜）
avatar: "elaina-avatar.webp"

# 站点图标（伊蕾娜）
favicon: "/images/elaina-avatar.webp"

# 侧边栏
sidebar:
  position: right
  menu: true
  article:
    show_common: true

# 小部件
widgets:
  - category
  - tag
  - archive
  - recent_posts

# 社交链接
social:
  github: https://github.com/YiLieNan
  bilibili: https://space.bilibili.com/3546923170532238
  rss: /atom.xml
  # email: mailto:xxx@gmail.com
  # zhihu: https://www.zhihu.com/people/你的用户名

# 页脚
footer:
  since: 2026
  powered: true
  count: true
  busuanzi: true

# 目录
toc: true
toc_options:
  list_number: true
  min_depth: 1
  max_depth: 6

# 暗色模式 (自动跟随系统)
dark_mode:
  enable: auto

# 代码块默认展开
code_block:
  expand: true

# 文章摘要
summary:
  enable: true
  style: subtitle

# 评论系统 (先用 giscus, 基于 GitHub Discussion)
# 不需要服务器, 有 GitHub 即可
comment:
  title:
    zh-CN: 说些什么吧！
  default: giscus

giscus:
  enable: true
  repo: YiLieNan/YiLieNan.github.io
  repoId: R_kgDOSw6vgQ
  category: Announcements
  categoryId: DIC_kwDOSw6vgc4C-kPU
  mapping: pathname
  strict: 0
  reactionsEnabled: 1
  inputPosition: bottom

