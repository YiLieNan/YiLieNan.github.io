<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// ══════════════════════════════════════════
//  中国象棋
// ══════════════════════════════════════════

const ROWS=10,COLS=9,RED='red',BLACK='black';
const NAMES={red:{general:'帅',advisor:'仕',elephant:'相',horse:'马',rook:'车',cannon:'炮',soldier:'兵'},
             black:{general:'将',advisor:'士',elephant:'象',horse:'马',rook:'车',cannon:'炮',soldier:'卒'}};

let board=[],selected=null,validMoves=[],turn=RED,gameOver=false;
let mode='local',peer=null,conn=null,roomCode='',myColor=RED;

const canvas=document.getElementById('boardCanvas');
const ctx=canvas.getContext('2d');
const PAD=40, CELL=(520-PAD*2)/9; // 48.888...
const CX=canvas.width, CY=canvas.height;

// ── 棋盘 ──
function initBoard(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  const p=(r,c,t,cl)=>{board[r][c]={type:t,color:cl,row:r,col:c}};
  p(0,0,'rook',BLACK);p(0,1,'horse',BLACK);p(0,2,'elephant',BLACK);
  p(0,3,'advisor',BLACK);p(0,4,'general',BLACK);
  p(0,5,'advisor',BLACK);p(0,6,'elephant',BLACK);
  p(0,7,'horse',BLACK);p(0,8,'rook',BLACK);
  p(2,1,'cannon',BLACK);p(2,7,'cannon',BLACK);
  for(let c=0;c<9;c+=2)p(3,c,'soldier',BLACK);
  p(9,0,'rook',RED);p(9,1,'horse',RED);p(9,2,'elephant',RED);
  p(9,3,'advisor',RED);p(9,4,'general',RED);
  p(9,5,'advisor',RED);p(9,6,'elephant',RED);
  p(9,7,'horse',RED);p(9,8,'rook',RED);
  p(7,1,'cannon',RED);p(7,7,'cannon',RED);
  for(let c=0;c<9;c+=2)p(6,c,'soldier',RED);
}

// ── 绘图 ──
function draw(){
  ctx.clearRect(0,0,CX,CY);
  const s=CELL,ox=PAD,oy=PAD;

  // 背景
  const bg=ctx.createLinearGradient(0,0,CX,CY);
  bg.addColorStop(0,'#f5e6c8');bg.addColorStop(1,'#e8d5a3');
  ctx.fillStyle=bg;rnd(0,0,CX,CY,12);ctx.fill();

  ctx.strokeStyle='#5a4a3a';ctx.lineWidth=1;
  // 横线
  for(let r=0;r<ROWS;r++){ctx.beginPath();ctx.moveTo(ox,oy+r*s);ctx.lineTo(ox+8*s,oy+r*s);ctx.stroke()}
  // 竖线
  for(let c=0;c<COLS;c++){
    if(c===0||c===8){ctx.beginPath();ctx.moveTo(ox+c*s,oy);ctx.lineTo(ox+c*s,oy+9*s);ctx.stroke()}
    else{ctx.beginPath();ctx.moveTo(ox+c*s,oy);ctx.lineTo(ox+c*s,oy+4*s);ctx.stroke();ctx.beginPath();ctx.moveTo(ox+c*s,oy+5*s);ctx.lineTo(ox+c*s,oy+9*s);ctx.stroke()}
  }
  // 九宫
  ctx.beginPath();ctx.moveTo(ox+3*s,oy);ctx.lineTo(ox+5*s,oy+2*s);
  ctx.moveTo(ox+5*s,oy);ctx.lineTo(ox+3*s,oy+2*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox+3*s,oy+7*s);ctx.lineTo(ox+5*s,oy+9*s);
  ctx.moveTo(ox+5*s,oy+7*s);ctx.lineTo(ox+3*s,oy+9*s);ctx.stroke();

  ctx.fillStyle='#5a4a3a';ctx.font=s*0.45+'px "KaiTi","STKaiti",serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('楚  河',ox+2*s,oy+4.5*s);
  ctx.fillText('汉  界',ox+6*s,oy+4.5*s);

  // 十字花
  for(const[r,c]of[[2,1],[2,7],[7,1],[7,7],[3,0],[3,2],[3,4],[3,6],[3,8],[6,0],[6,2],[6,4],[6,6],[6,8]])
    crs(ox+c*s,oy+r*s,s);

  // 棋子
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const p=board[r][c];if(!p)continue;
    const sel=selected&&selected.row===r&&selected.col===c;
    pc(ox+c*s,oy+r*s,s,p,sel);
  }

  // 走法提示
  for(const m of validMoves){
    const x=ox+m.col*s,y=oy+m.row*s,has=!!board[m.row][m.col];
    ctx.beginPath();ctx.arc(x,y,s*0.15,0,Math.PI*2);
    ctx.fillStyle=has?'rgba(231,76,60,.5)':'rgba(46,204,113,.6)';ctx.fill();
    if(has){
      ctx.beginPath();ctx.arc(x,y,s*0.40,0,Math.PI*2);
      ctx.strokeStyle='rgba(231,76,60,.6)';ctx.lineWidth=3;ctx.stroke();
    }
  }
}
function rnd(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function crs(x,y,s){
  const g=s*0.1,len=s*0.13;
  for(const[dx,dy]of[[-1,-1],[1,-1],[-1,1],[1,1]]){
    ctx.beginPath();ctx.moveTo(x+dx*g,y+dy*(g+len));
    ctx.lineTo(x+dx*(g+len),y+dy*g);ctx.lineTo(x+dx*(g+len*0.3),y+dy*(g+len*0.3));ctx.stroke();
  }
}
function pc(x,y,s,p,sel){
  const r=s*0.42,name=NAMES[p.color][p.type];
  ctx.save();ctx.shadowColor='rgba(0,0,0,.2)';ctx.shadowBlur=8;ctx.shadowOffsetX=2;ctx.shadowOffsetY=2;
  const g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
  if(p.color===RED){g.addColorStop(0,'#fff5f0');g.addColorStop(.7,'#fce4d6');g.addColorStop(1,'#f5c6b0')}
  else{g.addColorStop(0,'#f0f0f5');g.addColorStop(.7,'#e0e0e8');g.addColorStop(1,'#c8c8d5')}
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.shadowColor='transparent';
  ctx.strokeStyle=p.color===RED?'#c0392b':'#3a3a5a';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(x,y,r*0.85,0,Math.PI*2);
  ctx.strokeStyle=p.color===RED?'#c0392b':'#3a3a5a';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();
  // 选中高亮 — 加粗的蓝色虚线
  if(sel){
    ctx.beginPath();ctx.arc(x,y,r+5,0,Math.PI*2);
    ctx.strokeStyle='#3498db';ctx.lineWidth=4;ctx.setLineDash([6,5]);
    ctx.stroke();ctx.setLineDash([]);
    // 发光效果
    ctx.beginPath();ctx.arc(x,y,r+8,0,Math.PI*2);
    ctx.strokeStyle='rgba(52,152,219,.2)';ctx.lineWidth=6;ctx.stroke();
  }
  ctx.fillStyle=p.color===RED?'#c0392b':'#2d2d4a';
  ctx.font='bold '+s*0.38+'px "KaiTi","STKaiti","SimSun",serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(name,x,y+1);
}

// ── 坐标 ──
function clickPos(ev){
  const rect=canvas.getBoundingClientRect();
  const cx=ev.clientX-rect.left,cy=ev.clientY-rect.top;
  const col=Math.round((cx-PAD)/CELL),row=Math.round((cy-PAD)/CELL);
  if(row<0||row>=ROWS||col<0||col>=COLS)return null;
  if(Math.abs(cx-(PAD+col*CELL))>CELL*0.44)return null;
  if(Math.abs(cy-(PAD+row*CELL))>CELL*0.44)return null;
  return{row,col};
}

// ── 走法规则（完全自由：只限制基本走子规则，不限制将军）──
function ib(r,c){return r>=0&&r<ROWS&&c>=0&&c<COLS}
function ip(r,c,cl){return c>=3&&c<=5&&(cl===RED?(r>=7&&r<=9):(r>=0&&r<=2))}
function os(r,cl){return cl===RED?(r>=5):(r<=4)}

function getMoves(r,c){
  const p=board[r][c];if(!p)return[];
  const cl=p.color,res=[];
  switch(p.type){
    case'general':
      for(const[dr,dc]of[[0,1],[0,-1],[1,0],[-1,0]]){const nr=r+dr,nc=c+dc;if(ip(nr,nc,cl))res.push({row:nr,col:nc})}break;
    case'advisor':
      for(const[dr,dc]of[[1,1],[1,-1],[-1,1],[-1,-1]]){const nr=r+dr,nc=c+dc;if(ip(nr,nc,cl))res.push({row:nr,col:nc})}break;
    case'elephant':{
      const dirs=[[2,2],[2,-2],[-2,2],[-2,-2]],eyes=[[1,1],[1,-1],[-1,1],[-1,-1]];
      for(let i=0;i<4;i++){const nr=r+dirs[i][0],nc=c+dirs[i][1],er=r+eyes[i][0],ec=c+eyes[i][1];
        if(cl===RED&&nr<5)continue;if(cl===BLACK&&nr>4)continue;
        if(ib(nr,nc)&&!board[er][ec])res.push({row:nr,col:nc})}break;
    }
    case'horse':{
      for(const[mv,bl]of[[[-2,-1],[-1,0]],[[-2,1],[-1,0]],[[-1,-2],[0,-1]],[[-1,2],[0,1]],[[1,-2],[0,-1]],[[1,2],[0,1]],[[2,-1],[1,0]],[[2,1],[1,0]]]){
        const nr=r+mv[0],nc=c+mv[1],br=r+bl[0],bc=c+bl[1];
        if(ib(nr,nc)&&ib(br,bc)&&!board[br][bc])res.push({row:nr,col:nc})}break;
    }
    case'rook':
      for(const[dr,dc]of[[0,1],[0,-1],[1,0],[-1,0]]){
        let nr=r+dr,nc=c+dc;
        while(ib(nr,nc)){if(board[nr][nc]){res.push({row:nr,col:nc});break;}res.push({row:nr,col:nc});nr+=dr;nc+=dc;}
      }break;
    case'cannon':
      for(const[dr,dc]of[[0,1],[0,-1],[1,0],[-1,0]]){
        let nr=r+dr,nc=c+dc,jmp=false;
        while(ib(nr,nc)){if(!jmp){if(board[nr][nc])jmp=true;else res.push({row:nr,col:nc});}else{if(board[nr][nc]){res.push({row:nr,col:nc});break;}}nr+=dr;nc+=dc;}
      }break;
    case'soldier':{
      const fwd=cl===RED?-1:1,crs=!os(r,cl);
      if(ib(r+fwd,c))res.push({row:r+fwd,col:c});
      if(crs){if(ib(r,c-1))res.push({row:r,col:c-1});if(ib(r,c+1))res.push({row:r,col:c+1})}break;
    }
  }
  // 过滤：不能吃自己
  return res.filter(m=>{
    const t=board[m.row][m.col];
    return !(t&&t.color===cl);
  });
}

function findGen(cl){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)
    if(board[r][c]&&board[r][c].type==='general'&&board[r][c].color===cl)return{row:r,col:c};
  return null;
}

function flyingGenAfter(fr,fc,tr,tc,color){
  // 模拟走一步，检查是否将帅对面
  const p=board[fr][fc],cap=board[tr][tc];
  board[tr][tc]=p;board[fr][fc]=null;p.row=tr;p.col=tc;

  const rg=findGen(RED),bg=findGen(BLACK);
  let fg=false;
  if(rg&&bg&&rg.col===bg.col){
    let blocked=false;
    for(let r=Math.min(rg.row,bg.row)+1;r<Math.max(rg.row,bg.row);r++){if(board[r][rg.col]){blocked=true;break;}}
    fg=!blocked;
  }

  board[fr][fc]=p;board[tr][tc]=cap;p.row=fr;p.col=fc;
  return fg;
}

// ── 将军/将杀检测（仅用于显示提示，不限制走棋）──
function inCheck(cl){
  const gen=findGen(cl);if(!gen)return true;
  const enemy=cl===RED?BLACK:RED;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const p=board[r][c];if(!p||p.color!==enemy)continue;
    for(const m of getMoves(r,c))if(m.row===gen.row&&m.col===gen.col)return true;
  }
  return false;
}

function hasLegalMoves(cl){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const p=board[r][c];if(!p||p.color!==cl)continue;
    if(getMoves(r,c).length>0)return true;
  }
  return false;
}

// ── 交互 ──
function handleClick(ev){
  if(gameOver){msg('对局已结束，点「新局」');return}
  if(mode==='online'&&turn!==myColor){msg('等待对方走棋...');return}

  const pos=clickPos(ev);if(!pos)return;
  const{row,col}=pos,clicked=board[row][col];

  if(selected){
    if(clicked&&clicked.color===turn){
      selected={row,col};validMoves=getMoves(row,col);draw();
      msg(NAMES[turn][clicked.type]+' 选中');return;
    }
    if(validMoves.some(m=>m.row===row&&m.col===col)){
      doMove(selected.row,selected.col,row,col);
      selected=null;validMoves=[];return;
    }
    selected=null;validMoves=[];draw();msg('取消选择');return;
  }

  if(clicked&&clicked.color===turn){
    selected={row,col};validMoves=getMoves(row,col);draw();
    msg(NAMES[turn][clicked.type]+' 选中');
  }else msg('轮到 '+(turn===RED?'红方':'黑方'));
}

function doMove(fr,fc,tr,tc){
  const movingColor=turn; // 谁走这步棋
  const p=board[fr][fc],cap=board[tr][tc];
  board[tr][tc]=p;board[fr][fc]=null;p.row=tr;p.col=tc;

  // 吃将直接获胜
  if(cap&&cap.type==='general'){
    gameOver=true;
    const winner=movingColor===RED?'红方':'黑方';
    const loser=movingColor===RED?'黑方':'红方';
    showGameOver(winner, '吃掉了对方'+NAMES[movingColor===RED?BLACK:RED]['general']);
    if(mode==='online'&&conn)send({type:'gameover',winner});
    return;
  }

  // 将帅对面检测：谁造成的谁输
  const rg=findGen(RED),bg=findGen(BLACK);
  if(rg&&bg&&rg.col===bg.col){
    let blocked=false;
    for(let r=Math.min(rg.row,bg.row)+1;r<Math.max(rg.row,bg.row);r++){if(board[r][rg.col]){blocked=true;break;}}
    if(!blocked){
      gameOver=true;
      const loser=movingColor===RED?'红方':'黑方';
      const winner=movingColor===RED?'黑方':'红方';
      showGameOver(winner, loser+'造成将帅对面');
      if(mode==='online'&&conn)send({type:'gameover',winner});
      return;
    }
  }

  turn=turn===RED?BLACK:RED;

  // 检测将军和将杀（仅用于显示，不限制）
  const chk=inCheck(turn),legal=hasLegalMoves(turn);

  draw();
  if(!legal){
    gameOver=true;
    const w=turn===RED?'黑方':'红方';
    showGameOver(w, '对方无棋可走');
    if(mode==='online'&&conn)send({type:'gameover',winner:w});
    return;
  }
  if(chk)msg('⚠️ 将军！'+(turn===RED?'红方':'黑方')+'被将军');
  else msg('轮到 '+(turn===RED?'红方':'黑方'));
  document.getElementById('turn-indicator').className=turn;
  document.getElementById('turn-indicator').textContent=turn===RED?'🔴 红方走':'⚫ 黑方走';

  if(mode==='online'&&conn)send({type:'move',from:{row:fr,col:fc},to:{row:tr,col:tc}});
}

function doRemoteMove(fr,fc,tr,tc){
  const p=board[fr][fc];
  board[tr][tc]=p;board[fr][fc]=null;p.row=tr;p.col=tc;

  // 远程走棋也检查将帅对面
  const rg=findGen(RED),bg=findGen(BLACK);
  if(rg&&bg&&rg.col===bg.col){
    let blocked=false;
    for(let r=Math.min(rg.row,bg.row)+1;r<Math.max(rg.row,bg.row);r++){if(board[r][rg.col]){blocked=true;break;}}
    if(!blocked){
      gameOver=true;
      const winner=turn===RED?'黑方':'红方';
      showGameOver(winner, '对方造成将帅对面');return;
    }
  }

  turn=turn===RED?BLACK:RED;
  const chk=inCheck(turn),legal=hasLegalMoves(turn);
  draw();
  if(!legal){
    gameOver=true;const w=turn===RED?'黑方':'红方';
    showGameOver(w, '对方无棋可走');return;
  }
  if(chk)msg('⚠️ 将军！');else msg('轮到 '+(turn===RED?'红方':'黑方'));
  document.getElementById('turn-indicator').className=turn;
  document.getElementById('turn-indicator').textContent=turn===RED?'🔴 红方走':'⚫ 黑方走';
}

function resetGame(){
  initBoard();selected=null;validMoves=[];gameOver=false;
  if(mode!=='online')turn=RED;
  document.getElementById('turn-indicator').className=turn;
  document.getElementById('turn-indicator').textContent=turn===RED?'🔴 红方走':'⚫ 黑方走';
  msg('点击棋子选中，再点击目标移动');draw();
}
function msg(t){document.getElementById('message').textContent=t}

function showGameOver(winner, reason){
  document.getElementById('turn-indicator').className='over';
  document.getElementById('turn-indicator').textContent='🏆 '+winner+'胜！';
  document.getElementById('go-title').textContent=winner+'胜！';
  document.getElementById('go-desc').textContent=reason;
  document.getElementById('gameover-modal').classList.add('active');
  draw();
}
function closeGameOver(){
  document.getElementById('gameover-modal').classList.remove('active');
}

// ── 模式 ──
function startLocal(){mode='local';document.getElementById('mode-select').classList.add('hidden');document.getElementById('room-panel').classList.add('hidden');document.getElementById('game-area').classList.remove('hidden');document.getElementById('room-bar').classList.add('hidden');resetGame()}
function backMenu(){if(peer){peer.destroy();peer=null}if(conn){conn.close();conn=null}document.getElementById('mode-select').classList.remove('hidden');document.getElementById('room-panel').classList.add('hidden');document.getElementById('game-area').classList.add('hidden');document.getElementById('room-created-box').classList.add('hidden');document.getElementById('room-status').textContent='';mode='local'}
function showRoom(){document.getElementById('mode-select').classList.add('hidden');document.getElementById('room-panel').classList.remove('hidden')}

// ── 联网 ──
let connTimer = null;

function createRoom(){
  roomCode=String(Math.floor(1000+Math.random()*9000));
  document.getElementById('room-code-text').textContent=roomCode;
  document.getElementById('room-created-box').classList.remove('hidden');
  st('⏳ 连接信令服务器...','connecting');
  try{
    peer=new Peer('xiangqi-'+roomCode,{
      config:{iceServers:[
        {urls:'stun:stun.l.google.com:19302'},
        {urls:'stun:stun1.l.google.com:19302'}
      ]}
    });
    peer.on('open',()=>{st('✅ 已创建，等待对方加入...','connected')});
    peer.on('connection',c=>{
      conn=c;
      conn.on('open',()=>{if(connTimer){clearTimeout(connTimer);connTimer=null}myColor=RED;startOnline()});
      conn.on('data',hm);
      conn.on('close',()=>{if(mode==='online'){msg('对手已断开');document.getElementById('opp-dot').className='opp-dot offline';document.getElementById('opp-status').textContent='已断开';st('已断开','error')}});
    });
    peer.on('error',e=>{
      st('❌ 连接失败: '+e.type+' 可尝试刷新页面重试','error');
      document.getElementById('room-created-box').classList.add('hidden');
    });
    // 30秒超时
    setTimeout(()=>{
      if(!conn&&!gameOver){
        st('⏰ 超时：对方未连接，可刷新重试或换房间号','error');
        document.getElementById('room-created-box').classList.add('hidden');
        if(peer){peer.destroy();peer=null}
      }
    },30000);
  }catch(e){st('❌ 创建失败: '+e.message,'error')}
}

function joinRoom(){
  const code=document.getElementById('room-code-input').value.trim();
  if(!code||code.length!==4){st('⚠️ 输入4位房间号','error');return}
  roomCode=code;st('⏳ 连接信令服务器...','connecting');
  try{
    peer=new Peer(undefined,{
      config:{iceServers:[
        {urls:'stun:stun.l.google.com:19302'},
        {urls:'stun:stun1.l.google.com:19302'}
      ]}
    });
    peer.on('open',()=>{
      st('⏳ 正在连接对方...','connecting');
      conn=peer.connect('xiangqi-'+roomCode,{reliable:true});
      connTimer=setTimeout(()=>{
        st('⏰ 连接超时：对方不在线或房间号错误，请确认房间号','error');
        if(conn){conn.close();conn=null}
      },15000);
      conn.on('open',()=>{
        if(connTimer){clearTimeout(connTimer);connTimer=null}
        document.getElementById('room-created-box').classList.add('hidden');
        myColor=BLACK;startOnline()
      });
      conn.on('data',hm);
      conn.on('close',()=>{if(mode==='online'){msg('对手已断开');document.getElementById('opp-dot').className='opp-dot offline';document.getElementById('opp-status').textContent='已断开'}});
    });
    peer.on('error',e=>{st('❌ 连接失败: '+e.type+' 可刷新重试','error')});
    // 整体30秒超时
    setTimeout(()=>{
      if(!conn||!conn.open){
        st('⏰ 连接超时，请确认房间号正确后重试','error');
        if(conn){conn.close();conn=null}
        if(peer){peer.destroy();peer=null}
      }
    },30000);
  }catch(e){st('❌ 连接失败: '+e.message,'error')}
}
function startOnline(){
  mode='online';
  document.getElementById('mode-select').classList.add('hidden');document.getElementById('room-panel').classList.add('hidden');
  document.getElementById('room-created-box').classList.add('hidden');document.getElementById('game-area').classList.remove('hidden');
  document.getElementById('room-bar').classList.remove('hidden');document.getElementById('room-info-code').textContent=roomCode;
  document.getElementById('opp-status').textContent='已连接';document.getElementById('opp-dot').className='opp-dot online';
  resetGame();msg('你是'+(myColor===RED?'红方（先手）':'黑方（后手）'));
}
function hm(data){try{const m=typeof data==='string'?JSON.parse(data):data;switch(m.type){
  case'move':doRemoteMove(m.from.row,m.from.col,m.to.row,m.to.col);break;
  case'gameover':gameOver=true;document.getElementById('turn-indicator').className='over';document.getElementById('turn-indicator').textContent='🏆 '+m.winner+'胜！';msg('🏆 '+m.winner+'获胜！');draw();break
}}catch(e){}}
function send(m){if(conn&&conn.open)conn.send(JSON.stringify(m))}
function st(t,c){const el=document.getElementById('room-status');el.textContent=t;el.className=c||''}

function doLeave(){document.getElementById('leave-modal-text').textContent=mode==='online'?'退出将断开与对手的连接':'确定退出对局吗？';document.getElementById('leave-modal').classList.add('active')}
function closeModal(){document.getElementById('leave-modal').classList.remove('active')}
function confirmLeave(){closeModal();if(conn){conn.close();conn=null}if(peer){peer.destroy();peer=null}backMenu()}

// ── 启动 ──
initBoard();draw();

canvas.onclick=handleClick;
canvas.ontouchstart=function(e){e.preventDefault();handleClick(e.touches[0])};
</script>
