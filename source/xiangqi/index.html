<script>
// ══════════════════════════════════════════════════
//  中国象棋 - 完整游戏逻辑
// ══════════════════════════════════════════════════

const ROWS = 10;
const COLS = 9;

// 棋子类型
const PIECE = {
  GENERAL: 'general',   // 将/帅
  ADVISOR: 'advisor',   // 士/仕
  ELEPHANT: 'elephant', // 象/相
  HORSE: 'horse',       // 马
  ROOK: 'rook',         // 车
  CANNON: 'cannon',     // 炮
  SOLDIER: 'soldier'    // 兵/卒
};

const RED = 'red';
const BLACK = 'black';

// 棋子名称显示
const PIECE_NAMES = {
  red: { general: '帅', advisor: '仕', elephant: '相', horse: '马', rook: '车', cannon: '炮', soldier: '兵' },
  black: { general: '将', advisor: '士', elephant: '象', horse: '马', rook: '车', cannon: '炮', soldier: '卒' }
};

let board = [];
let selectedPiece = null;     // { row, col }
let validMoves = [];          // [{ row, col }]
let currentTurn = RED;
let gameOver = false;
let moveCount = 0;

// Canvas 引用
let canvas, ctx;
let cellSize;
const PADDING = 40;

// ═══════════════════════ 初始化 ═══════════════════════

function initBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      board[r][c] = null;
    }
  }

  // 黑方 (上方, row 0-4)
  placePiece(0, 0, PIECE.ROOK, BLACK);
  placePiece(0, 1, PIECE.HORSE, BLACK);
  placePiece(0, 2, PIECE.ELEPHANT, BLACK);
  placePiece(0, 3, PIECE.ADVISOR, BLACK);
  placePiece(0, 4, PIECE.GENERAL, BLACK);
  placePiece(0, 5, PIECE.ADVISOR, BLACK);
  placePiece(0, 6, PIECE.ELEPHANT, BLACK);
  placePiece(0, 7, PIECE.HORSE, BLACK);
  placePiece(0, 8, PIECE.ROOK, BLACK);
  placePiece(2, 1, PIECE.CANNON, BLACK);
  placePiece(2, 7, PIECE.CANNON, BLACK);
  for (let c = 0; c < 9; c += 2) placePiece(3, c, PIECE.SOLDIER, BLACK);

  // 红方 (下方, row 5-9)
  placePiece(9, 0, PIECE.ROOK, RED);
  placePiece(9, 1, PIECE.HORSE, RED);
  placePiece(9, 2, PIECE.ELEPHANT, RED);
  placePiece(9, 3, PIECE.ADVISOR, RED);
  placePiece(9, 4, PIECE.GENERAL, RED);
  placePiece(9, 5, PIECE.ADVISOR, RED);
  placePiece(9, 6, PIECE.ELEPHANT, RED);
  placePiece(9, 7, PIECE.HORSE, RED);
  placePiece(9, 8, PIECE.ROOK, RED);
  placePiece(7, 1, PIECE.CANNON, RED);
  placePiece(7, 7, PIECE.CANNON, RED);
  for (let c = 0; c < 9; c += 2) placePiece(6, c, PIECE.SOLDIER, RED);
}

function placePiece(row, col, type, color) {
  board[row][col] = { type, color, row, col };
}

// ═══════════════════════ Canvas 绘制 ═══════════════════════

function resizeCanvas() {
  canvas = document.getElementById('boardCanvas');
  ctx = canvas.getContext('2d');

  const wrap = canvas.parentElement;
  const width = wrap.clientWidth - 20;
  const size = Math.min(width, 520);
  const dpr = window.devicePixelRatio || 1;

  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  ctx.scale(dpr, dpr);

  cellSize = (size - PADDING * 2) / 8;
  drawBoard();
}

function drawBoard() {
  const w = canvas.width / (window.devicePixelRatio || 1);
  const h = canvas.height / (window.devicePixelRatio || 1);
  ctx.clearRect(0, 0, w, h);

  const s = cellSize;
  const ox = PADDING;
  const oy = PADDING;

  // 背景
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, '#f5e6c8');
  grad.addColorStop(1, '#e8d5a3');
  ctx.fillStyle = grad;
  ctx.roundRect(0, 0, w, h, 12);
  ctx.fill();

  // 网格线
  ctx.strokeStyle = '#5a4a3a';
  ctx.lineWidth = 1;

  // 横线
  for (let r = 0; r < ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(ox, oy + r * s);
    ctx.lineTo(ox + 8 * s, oy + r * s);
    ctx.stroke();
  }

  // 竖线（河界处断开）
  for (let c = 0; c < COLS; c++) {
    if (c === 0 || c === 8) {
      // 边线贯穿
      ctx.beginPath();
      ctx.moveTo(ox + c * s, oy);
      ctx.lineTo(ox + c * s, oy + 9 * s);
      ctx.stroke();
    } else {
      // 上半
      ctx.beginPath();
      ctx.moveTo(ox + c * s, oy);
      ctx.lineTo(ox + c * s, oy + 4 * s);
      ctx.stroke();
      // 下半
      ctx.beginPath();
      ctx.moveTo(ox + c * s, oy + 5 * s);
      ctx.lineTo(ox + c * s, oy + 9 * s);
      ctx.stroke();
    }
  }

  // 九宫格斜线
  // 黑方 (0,3)-(2,5)
  ctx.beginPath();
  ctx.moveTo(ox + 3*s, oy); ctx.lineTo(ox + 5*s, oy + 2*s);
  ctx.moveTo(ox + 5*s, oy); ctx.lineTo(ox + 3*s, oy + 2*s);
  ctx.stroke();
  // 红方 (7,3)-(9,5)
  ctx.beginPath();
  ctx.moveTo(ox + 3*s, oy + 7*s); ctx.lineTo(ox + 5*s, oy + 9*s);
  ctx.moveTo(ox + 5*s, oy + 7*s); ctx.lineTo(ox + 3*s, oy + 9*s);
  ctx.stroke();

  // 河界文字
  ctx.fillStyle = '#5a4a3a';
  ctx.font = `${s * 0.5}px "KaiTi", "STKaiti", serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const riverY = oy + 4.5 * s;
  ctx.fillText('楚  河', ox + 2 * s, riverY);
  ctx.fillText('汉  界', ox + 6 * s, riverY);

  // 兵/炮 位置标记（十字花）
  const marks = [
    [2,1],[2,7],[7,1],[7,7], // 炮
    [3,0],[3,2],[3,4],[3,6],[3,8], // 黑卒
    [6,0],[6,2],[6,4],[6,6],[6,8]  // 红兵
  ];
  for (const [r, c] of marks) {
    drawMark(ox + c * s, oy + r * s, s);
  }

  // 绘制棋子
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const piece = board[r][c];
      if (!piece) continue;
      const x = ox + c * s;
      const y = oy + r * s;
      const isSelected = selectedPiece && selectedPiece.row === r && selectedPiece.col === c;
      drawPiece(x, y, s, piece, isSelected);
    }
  }

  // 绘制有效移动提示
  for (const m of validMoves) {
    const x = ox + m.col * s;
    const y = oy + m.row * s;
    ctx.beginPath();
    ctx.arc(x, y, s * 0.12, 0, Math.PI * 2);
    ctx.fillStyle = board[m.row][m.col] ? 'rgba(231,76,60,0.3)' : 'rgba(46,204,113,0.4)';
    ctx.fill();

    if (board[m.row][m.col]) {
      ctx.beginPath();
      ctx.arc(x, y, s * 0.38, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(231,76,60,0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }
}

function drawMark(x, y, s) {
  const g = s * 0.1;
  const len = s * 0.15;
  ctx.strokeStyle = '#5a4a3a';
  ctx.lineWidth = 1;
  // 四个方向的小撇
  const dirs = [[-1,-1],[1,-1],[-1,1],[1,1]];
  for (const [dx, dy] of dirs) {
    ctx.beginPath();
    ctx.moveTo(x + dx * g, y + dy * (g + len));
    ctx.lineTo(x + dx * (g + len), y + dy * g);
    ctx.lineTo(x + dx * (g + len * 0.3), y + dy * (g + len * 0.3));
    ctx.stroke();
  }
}

function drawPiece(x, y, s, piece, isSelected) {
  const r = s * 0.42;
  const name = PIECE_NAMES[piece.color][piece.type];

  // 阴影
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;

  // 棋子背景
  const grad = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
  if (piece.color === RED) {
    grad.addColorStop(0, '#fff5f0');
    grad.addColorStop(0.7, '#fce4d6');
    grad.addColorStop(1, '#f5c6b0');
  } else {
    grad.addColorStop(0, '#f0f0f5');
    grad.addColorStop(0.7, '#e0e0e8');
    grad.addColorStop(1, '#c8c8d5');
  }

  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // 边框
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = piece.color === RED ? '#c0392b' : '#3a3a5a';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 内圈
  ctx.beginPath();
  ctx.arc(x, y, r * 0.85, 0, Math.PI * 2);
  ctx.strokeStyle = piece.color === RED ? '#c0392b' : '#3a3a5a';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 选中高亮
  if (isSelected) {
    ctx.beginPath();
    ctx.arc(x, y, r + 3, 0, Math.PI * 2);
    ctx.strokeStyle = '#3498db';
    ctx.lineWidth = 3;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();

  // 文字
  ctx.fillStyle = piece.color === RED ? '#c0392b' : '#2d2d4a';
  ctx.font = `bold ${s * 0.38}px "KaiTi", "STKaiti", "SimSun", serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(name, x, y + 1);
}

// Canvas roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    const [tl, tr, br, bl] = r.length === 4 ? r : [r[0], r[0], r[0], r[0]];
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
  };
}

// ═══════════════════════ 坐标转换 ═══════════════════════

function getBoardPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = (canvas.width / (window.devicePixelRatio || 1)) / rect.width;
  const scaleY = (canvas.height / (window.devicePixelRatio || 1)) / rect.height;
  const x = (clientX - rect.left) * scaleX;
  const y = (clientY - rect.top) * scaleY;

  const s = cellSize;
  const ox = PADDING;
  const oy = PADDING;

  const col = Math.round((x - ox) / s);
  const row = Math.round((y - oy) / s);

  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return null;

  const dx = Math.abs(x - (ox + col * s));
  const dy = Math.abs(y - (oy + row * s));
  if (dx > s * 0.45 || dy > s * 0.45) return null;

  return { row, col };
}

// ═══════════════════════ 走法生成 ═══════════════════════

function inBoard(r, c) {
  return r >= 0 && r < ROWS && c >= 0 && c < COLS;
}

function inPalace(r, c, color) {
  if (c < 3 || c > 5) return false;
  if (color === RED) return r >= 7 && r <= 9;
  return r >= 0 && r <= 2;
}

function getMoves(row, col) {
  const piece = board[row][col];
  if (!piece) return [];

  const moves = [];
  const color = piece.color;

  switch (piece.type) {
    case PIECE.GENERAL:
      moves.push(...getGeneralMoves(row, col, color));
      break;
    case PIECE.ADVISOR:
      moves.push(...getAdvisorMoves(row, col, color));
      break;
    case PIECE.ELEPHANT:
      moves.push(...getElephantMoves(row, col, color));
      break;
    case PIECE.HORSE:
      moves.push(...getHorseMoves(row, col, color));
      break;
    case PIECE.ROOK:
      moves.push(...getRookMoves(row, col, color));
      break;
    case PIECE.CANNON:
      moves.push(...getCannonMoves(row, col, color));
      break;
    case PIECE.SOLDIER:
      moves.push(...getSoldierMoves(row, col, color));
      break;
  }

  // 过滤：不能吃自己、不能造成将帅对面
  return moves.filter(m => {
    if (board[m.row][m.col] && board[m.row][m.col].color === color) return false;
    // 模拟走这一步
    const captured = board[m.row][m.col];
    board[m.row][m.col] = board[row][col];
    board[row][col] = null;
    board[m.row][m.col].row = m.row;
    board[m.row][m.col].col = m.col;

    const legal = !isGeneralExposed(color) && !isFlyingGeneral();

    // 撤销
    board[row][col] = board[m.row][m.col];
    board[row][col].row = row;
    board[row][col].col = col;
    board[m.row][m.col] = captured;

    return legal;
  });
}

function getGeneralMoves(r, c, color) {
  const moves = [];
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  for (const [dr, dc] of dirs) {
    const nr = r + dr, nc = c + dc;
    if (inPalace(nr, nc, color)) moves.push({ row: nr, col: nc });
  }
  return moves;
}

function getAdvisorMoves(r, c, color) {
  const moves = [];
  const dirs = [[1,1],[1,-1],[-1,1],[-1,-1]];
  for (const [dr, dc] of dirs) {
    const nr = r + dr, nc = c + dc;
    if (inPalace(nr, nc, color)) moves.push({ row: nr, col: nc });
  }
  return moves;
}

function getElephantMoves(r, c, color) {
  const moves = [];
  const dirs = [[2,2],[2,-2],[-2,2],[-2,-2]];
  const eyes = [[1,1],[1,-1],[-1,1],[-1,-1]];
  for (let i = 0; i < 4; i++) {
    const nr = r + dirs[i][0], nc = c + dirs[i][1];
    const er = r + eyes[i][0], ec = c + eyes[i][1];
    // 不能过河
    if (color === RED && nr < 5) continue;
    if (color === BLACK && nr > 4) continue;
    if (inBoard(nr, nc) && !board[er][ec]) moves.push({ row: nr, col: nc });
  }
  return moves;
}

function getHorseMoves(r, c, color) {
  const moves = [];
  // 蹩马腿方向: [移动方向, 蹩腿位置偏移]
  const steps = [
    [[-2,-1],[-1,0]], [[-2,1],[-1,0]],
    [[-1,-2],[0,-1]], [[-1,2],[0,1]],
    [[1,-2],[0,-1]], [[1,2],[0,1]],
    [[2,-1],[1,0]], [[2,1],[1,0]]
  ];
  for (const [move, block] of steps) {
    const nr = r + move[0], nc = c + move[1];
    const br = r + block[0], bc = c + block[1];
    if (inBoard(nr, nc) && !board[br][bc]) moves.push({ row: nr, col: nc });
  }
  return moves;
}

function getRookMoves(r, c, color) {
  const moves = [];
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  for (const [dr, dc] of dirs) {
    let nr = r + dr, nc = c + dc;
    while (inBoard(nr, nc)) {
      if (board[nr][nc]) {
        if (board[nr][nc].color !== color) moves.push({ row: nr, col: nc });
        break;
      }
      moves.push({ row: nr, col: nc });
      nr += dr; nc += dc;
    }
  }
  return moves;
}

function getCannonMoves(r, c, color) {
  const moves = [];
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  for (const [dr, dc] of dirs) {
    let nr = r + dr, nc = c + dc;
    let jumped = false;
    while (inBoard(nr, nc)) {
      if (!jumped) {
        if (board[nr][nc]) {
          jumped = true; // 找到炮架
        } else {
          moves.push({ row: nr, col: nc });
        }
      } else {
        if (board[nr][nc]) {
          if (board[nr][nc].color !== color) moves.push({ row: nr, col: nc });
          break;
        }
      }
      nr += dr; nc += dc;
    }
  }
  return moves;
}

function getSoldierMoves(r, c, color) {
  const moves = [];
  const forward = (color === RED) ? -1 : 1;
  const crossed = (color === RED) ? (r <= 4) : (r >= 5);

  // 前进
  const nr = r + forward;
  if (inBoard(nr, c)) moves.push({ row: nr, col: c });

  // 过河后可左右
  if (crossed) {
    if (inBoard(r, c-1)) moves.push({ row: r, col: c-1 });
    if (inBoard(r, c+1)) moves.push({ row: r, col: c+1 });
  }
  return moves;
}

// ═══════════════════════ 将军检测 ═══════════════════════

function findGeneral(color) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const p = board[r][c];
      if (p && p.type === PIECE.GENERAL && p.color === color) {
        return { row: r, col: c };
      }
    }
  }
  return null;
}

function isUnderAttack(row, col, byColor) {
  // 检查 byColor 方是否有棋子能攻击 (row, col)
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const p = board[r][c];
      if (!p || p.color !== byColor) continue;
      const moves = getRawMoves(r, c);
      if (moves.some(m => m.row === row && m.col === col)) return true;
    }
  }
  return false;
}

function getRawMoves(r, c) {
  const piece = board[r][c];
  if (!piece) return [];
  const moves = [];
  const color = piece.color;

  switch (piece.type) {
    case PIECE.GENERAL: {
      const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
      for (const [dr, dc] of dirs) {
        const nr = r + dr, nc = c + dc;
        if (inPalace(nr, nc, color)) moves.push({ row: nr, col: nc });
      }
      break;
    }
    case PIECE.ADVISOR: {
      const dirs = [[1,1],[1,-1],[-1,1],[-1,-1]];
      for (const [dr, dc] of dirs) {
        const nr = r + dr, nc = c + dc;
        if (inPalace(nr, nc, color)) moves.push({ row: nr, col: nc });
      }
      break;
    }
    case PIECE.ELEPHANT: {
      const dirs = [[2,2],[2,-2],[-2,2],[-2,-2]];
      const eyes = [[1,1],[1,-1],[-1,1],[-1,-1]];
      for (let i = 0; i < 4; i++) {
        const nr = r + dirs[i][0], nc = c + dirs[i][1];
        const er = r + eyes[i][0], ec = c + eyes[i][1];
        if (color === RED && nr < 5) continue;
        if (color === BLACK && nr > 4) continue;
        if (inBoard(nr, nc) && !board[er][ec]) moves.push({ row: nr, col: nc });
      }
      break;
    }
    case PIECE.HORSE: {
      const steps = [
        [[-2,-1],[-1,0]], [[-2,1],[-1,0]],
        [[-1,-2],[0,-1]], [[-1,2],[0,1]],
        [[1,-2],[0,-1]], [[1,2],[0,1]],
        [[2,-1],[1,0]], [[2,1],[1,0]]
      ];
      for (const [move, block] of steps) {
        const nr = r + move[0], nc = c + move[1];
        const br = r + block[0], bc = c + block[1];
        if (inBoard(nr, nc) && !board[br][bc]) moves.push({ row: nr, col: nc });
      }
      break;
    }
    case PIECE.ROOK: {
      const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
      for (const [dr, dc] of dirs) {
        let nr = r + dr, nc = c + dc;
        while (inBoard(nr, nc)) {
          moves.push({ row: nr, col: nc });
          if (board[nr][nc]) break;
          nr += dr; nc += dc;
        }
      }
      break;
    }
    case PIECE.CANNON: {
      const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
      for (const [dr, dc] of dirs) {
        let nr = r + dr, nc = c + dc;
        let jumped = false;
        while (inBoard(nr, nc)) {
          if (!jumped) {
            moves.push({ row: nr, col: nc });
            if (board[nr][nc]) jumped = true;
          } else {
            if (board[nr][nc]) { moves.push({ row: nr, col: nc }); break; }
          }
          nr += dr; nc += dc;
        }
      }
      break;
    }
    case PIECE.SOLDIER: {
      const forward = (color === RED) ? -1 : 1;
      const crossed = (color === RED) ? (r <= 4) : (r >= 5);
      const nr = r + forward;
      if (inBoard(nr, c)) moves.push({ row: nr, col: c });
      if (crossed) {
        if (inBoard(r, c-1)) moves.push({ row: r, col: c-1 });
        if (inBoard(r, c+1)) moves.push({ row: r, col: c+1 });
      }
      break;
    }
  }
  return moves;
}

function isGeneralExposed(color) {
  const general = findGeneral(color);
  if (!general) return true;
  const enemy = (color === RED) ? BLACK : RED;
  return isUnderAttack(general.row, general.col, enemy);
}

function isFlyingGeneral() {
  const redGen = findGeneral(RED);
  const blackGen = findGeneral(BLACK);
  if (!redGen || !blackGen) return false;
  if (redGen.col !== blackGen.col) return false;
  // 检查中间是否有棋子
  const minR = Math.min(redGen.row, blackGen.row);
  const maxR = Math.max(redGen.row, blackGen.row);
  for (let r = minR + 1; r < maxR; r++) {
    if (board[r][redGen.col]) return false;
  }
  return true;
}

function isInCheck(color) {
  const gen = findGeneral(color);
  if (!gen) return true;
  const enemy = (color === RED) ? BLACK : RED;
  return isUnderAttack(gen.row, gen.col, enemy);
}

function hasLegalMoves(color) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const p = board[r][c];
      if (!p || p.color !== color) continue;
      const moves = getMoves(r, c);
      if (moves.length > 0) return true;
    }
  }
  return false;
}

// ═══════════════════════ 游戏逻辑 ═══════════════════════

function handleClick(clientX, clientY) {
  if (gameOver) return;

  const pos = getBoardPos(clientX, clientY);
  if (!pos) return;

  const { row, col } = pos;
  const clickedPiece = board[row][col];

  // 如果已选中棋子
  if (selectedPiece) {
    // 点击自己的另一个棋子 → 切换选中
    if (clickedPiece && clickedPiece.color === currentTurn) {
      selectedPiece = { row, col };
      validMoves = getMoves(row, col);
      drawBoard();
      document.getElementById('message').textContent = PIECE_NAMES[currentTurn][clickedPiece.type] + ' 已选中';
      return;
    }

    // 点击有效移动位置
    const isValid = validMoves.some(m => m.row === row && m.col === col);
    if (isValid) {
      makeMove(selectedPiece.row, selectedPiece.col, row, col);
      selectedPiece = null;
      validMoves = [];
      return;
    }

    // 点击无效位置 → 取消选中
    selectedPiece = null;
    validMoves = [];
    drawBoard();
    document.getElementById('message').textContent = '已取消选择';
    return;
  }

  // 未选中：选自己的棋子
  if (clickedPiece && clickedPiece.color === currentTurn) {
    selectedPiece = { row, col };
    validMoves = getMoves(row, col);
    drawBoard();
    document.getElementById('message').textContent = PIECE_NAMES[currentTurn][clickedPiece.type] + ' 已选中';
  }
}

function makeMove(fromR, fromC, toR, toC) {
  const piece = board[fromR][fromC];
  const captured = board[toR][toC];

  // 执行移动
  board[toR][toC] = piece;
  board[fromR][fromC] = null;
  piece.row = toR;
  piece.col = toC;

  moveCount++;

  // 消息
  const name = PIECE_NAMES[currentTurn][piece.type];
  const turnName = currentTurn === RED ? '红方' : '黑方';
  let msg = `${turnName} ${name}`;
  if (captured) {
    msg += ` 吃${PIECE_NAMES[currentTurn === RED ? BLACK : RED][captured.type]}`;
  }
  msg += ` ${String.fromCharCode(65 + (8 - fromC))}${10 - fromR} → ${String.fromCharCode(65 + (8 - toC))}${10 - toR}`;
  document.getElementById('move-log').textContent = `第 ${moveCount} 手`;

  // 切换回合
  const nextTurn = (currentTurn === RED) ? BLACK : RED;
  currentTurn = nextTurn;

  // 检测将军
  const inCheck = isInCheck(currentTurn);
  const hasLegal = hasLegalMoves(currentTurn);

  if (!hasLegal) {
    gameOver = true;
    const winner = currentTurn === RED ? '黑方' : '红方';
    document.getElementById('turn-indicator').className = 'over';
    document.getElementById('turn-indicator').textContent = `🏆 ${winner}胜！`;
    document.getElementById('message').textContent = `${winner}获胜！点击「新局」再来一局`;
    drawBoard();
    return;
  }

  if (inCheck) {
    document.getElementById('message').textContent = `⚠️ 将军！${currentTurn === RED ? '红方' : '黑方'} 被将军！`;
  } else {
    document.getElementById('message').textContent = `轮到 ${currentTurn === RED ? '红方' : '黑方'} 走棋`;
  }

  // 更新显示
  document.getElementById('turn-indicator').className = currentTurn;
  document.getElementById('turn-indicator').textContent =
    (currentTurn === RED ? '🔴 红方走' : '⚫ 黑方走');
  drawBoard();
}

function resetGame() {
  initBoard();
  selectedPiece = null;
  validMoves = [];
  currentTurn = RED;
  gameOver = false;
  moveCount = 0;

  document.getElementById('turn-indicator').className = 'red';
  document.getElementById('turn-indicator').textContent = '🔴 红方走';
  document.getElementById('message').textContent = '点击棋子选中，再点击目标位置移动';
  document.getElementById('move-log').textContent = '';
  drawBoard();
}

// ═══════════════════════ 事件绑定 ═══════════════════════

canvas.addEventListener('click', function(e) {
  handleClick(e.clientX, e.clientY);
});

// 触屏支持
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  const touch = e.touches[0];
  handleClick(touch.clientX, touch.clientY);
});

window.addEventListener('resize', function() {
  resizeCanvas();
  drawBoard();
});

// ═══════════════════════ 启动 ═══════════════════════

initBoard();
resizeCanvas();
</script>
