<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {

.hidden { display:none !important; }

/* 容器 */
.container {
  background:rgba(255,255,255,0.05); backdrop-filter:blur(10px);
  border-radius:24px; padding:24px; box-shadow:0 20px 60px rgba(0,0,0,0.4);

/* ── 顶部 ── */
.header {

}
.header .title { color:#fff; font-size:18px; font-weight:700; }

}
#turn-indicator.red { background:rgba(231,76,60,0.2); color:#e74c3c; }

}

#room-status { font-size:13px; color:#888; margin-top:8px; }

/* ── 游戏区域 ── */

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// ══════════════════════════════════════════════════
//  中国象棋 - 本地 + 联网双模式
// ══════════════════════════════════════════════════

const ROWS = 10, COLS = 9;
const RED = 'red', BLACK = 'black';
const PIECE_NAMES = {
  red: { general:'帅', advisor:'仕', elephant:'相', horse:'马', rook:'车', cannon:'炮', soldier:'兵' },
  black: { general:'将', advisor:'士', elephant:'象', horse:'马', rook:'车', cannon:'炮', soldier:'卒' }
};

let board = [];
let selectedPiece = null;
let validMoves = [];
let currentTurn = RED;
let gameOver = false;

// 联网状态
let gameMode = 'local'; // 'local' | 'online'
let peer = null;
let conn = null;
let isCreator = false;
let roomCode = '';
let myColor = RED;     // 创建者=红，加入者=黑
let opponentConnected = false;

// Canvas
let canvas, ctx;
let cellSize;
const PAD = 40;

// ═══════════════════════ 初始化 ═══════════════════════

function initBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) board[r][c] = null;
  }
  const place = (r, c, type, color) => { board[r][c] = { type, color, row: r, col: c }; };
  // 黑方
  place(0,0,'rook',BLACK); place(0,1,'horse',BLACK); place(0,2,'elephant',BLACK);
  place(0,3,'advisor',BLACK); place(0,4,'general',BLACK);
  place(0,5,'advisor',BLACK); place(0,6,'elephant',BLACK);
  place(0,7,'horse',BLACK); place(0,8,'rook',BLACK);
  place(2,1,'cannon',BLACK); place(2,7,'cannon',BLACK);
  for (let c = 0; c < 9; c += 2) place(3, c, 'soldier', BLACK);
  // 红方
  place(9,0,'rook',RED); place(9,1,'horse',RED); place(9,2,'elephant',RED);
  place(9,3,'advisor',RED); place(9,4,'general',RED);
  place(9,5,'advisor',RED); place(9,6,'elephant',RED);
  place(9,7,'horse',RED); place(9,8,'rook',RED);
  place(7,1,'cannon',RED); place(7,7,'cannon',RED);
  for (let c = 0; c < 9; c += 2) place(6, c, 'soldier', RED);
}

// ═══════════════════════ Canvas ═══════════════════════

function setupCanvas() {
  canvas = document.getElementById('boardCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvasInternal();
}

function resizeCanvasInternal() {
  const wrap = canvas.parentElement;
  const w = wrap.clientWidth - 16;
  const size = Math.min(w, 520);
  const dpr = window.devicePixelRatio || 1;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
  cellSize = (size - PAD * 2) / 8;
  drawBoard();
}

function drawBoard() {
  const w = canvas.width / (window.devicePixelRatio || 1);
  const h = canvas.height / (window.devicePixelRatio || 1);
  ctx.clearRect(0, 0, w, h);
  const s = cellSize;
  const ox = PAD, oy = PAD;

  // 棋盘背景
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, '#f5e6c8'); grad.addColorStop(1, '#e8d5a3');
  ctx.fillStyle = grad; roundRect(ctx, 0, 0, w, h, 12); ctx.fill();

  ctx.strokeStyle = '#5a4a3a'; ctx.lineWidth = 1;

  // 横线
  for (let r = 0; r < ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(ox, oy + r * s); ctx.lineTo(ox + 8 * s, oy + r * s); ctx.stroke();
  }
  // 竖线
  for (let c = 0; c < COLS; c++) {
    if (c === 0 || c === 8) {
      ctx.beginPath(); ctx.moveTo(ox + c*s, oy); ctx.lineTo(ox + c*s, oy + 9*s); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(ox + c*s, oy); ctx.lineTo(ox + c*s, oy + 4*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ox + c*s, oy + 5*s); ctx.lineTo(ox + c*s, oy + 9*s); ctx.stroke();
    }
  }
  // 九宫斜线
  ctx.beginPath(); ctx.moveTo(ox+3*s,oy); ctx.lineTo(ox+5*s,oy+2*s);
  ctx.moveTo(ox+5*s,oy); ctx.lineTo(ox+3*s,oy+2*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox+3*s,oy+7*s); ctx.lineTo(ox+5*s,oy+9*s);
  ctx.moveTo(ox+5*s,oy+7*s); ctx.lineTo(ox+3*s,oy+9*s); ctx.stroke();

  // 河界
  ctx.fillStyle = '#5a4a3a';
  ctx.font = `${s * 0.45}px "KaiTi","STKaiti",serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('楚  河', ox + 2 * s, oy + 4.5 * s);
  ctx.fillText('汉  界', ox + 6 * s, oy + 4.5 * s);

  // 炮/兵位置标记
  const marks = [[2,1],[2,7],[7,1],[7,7],[3,0],[3,2],[3,4],[3,6],[3,8],[6,0],[6,2],[6,4],[6,6],[6,8]];
  for (const [r,c] of marks) drawStar(ox + c*s, oy + r*s, s);

  // 棋子
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const p = board[r][c];
      if (!p) continue;
      const isSel = selectedPiece && selectedPiece.row === r && selectedPiece.col === c;
      drawPiece(ox + c*s, oy + r*s, s, p, isSel);
    }
  }

  // 走法提示
  for (const m of validMoves) {
    const x = ox + m.col * s, y = oy + m.row * s;
    const hasPiece = !!board[m.row][m.col];
    ctx.beginPath(); ctx.arc(x, y, s * 0.12, 0, Math.PI * 2);
    ctx.fillStyle = hasPiece ? 'rgba(231,76,60,0.3)' : 'rgba(46,204,113,0.4)'; ctx.fill();
    if (hasPiece) {
      ctx.beginPath(); ctx.arc(x, y, s * 0.38, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(231,76,60,0.5)'; ctx.lineWidth = 2; ctx.stroke();
    }
  }
}

function drawStar(x, y, s) {
  const g = s * 0.1, len = s * 0.13;
  ctx.strokeStyle = '#5a4a3a'; ctx.lineWidth = 1;
  for (const [dx,dy] of [[-1,-1],[1,-1],[-1,1],[1,1]]) {
    ctx.beginPath();
    ctx.moveTo(x + dx*g, y + dy*(g+len));
    ctx.lineTo(x + dx*(g+len), y + dy*g);
    ctx.lineTo(x + dx*(g+len*0.3), y + dy*(g+len*0.3));
    ctx.stroke();
  }
}

function drawPiece(x, y, s, piece, isSel) {
  const r = s * 0.42;
  const name = PIECE_NAMES[piece.color][piece.type];
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.2)'; ctx.shadowBlur = 6; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
  const grad = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
  if (piece.color === RED) {
    grad.addColorStop(0,'#fff5f0'); grad.addColorStop(0.7,'#fce4d6'); grad.addColorStop(1,'#f5c6b0');
  } else {
    grad.addColorStop(0,'#f0f0f5'); grad.addColorStop(0.7,'#e0e0e8'); grad.addColorStop(1,'#c8c8d5');
  }
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = piece.color === RED ? '#c0392b' : '#3a3a5a'; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(x, y, r*0.85, 0, Math.PI*2);
  ctx.strokeStyle = piece.color === RED ? '#c0392b' : '#3a3a5a'; ctx.lineWidth = 1; ctx.stroke();
  if (isSel) {
    ctx.beginPath(); ctx.arc(x, y, r+3, 0, Math.PI*2);
    ctx.strokeStyle = '#3498db'; ctx.lineWidth = 3; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
  }
  ctx.restore();
  ctx.fillStyle = piece.color === RED ? '#c0392b' : '#2d2d4a';
  ctx.font = `bold ${s*0.38}px "KaiTi","STKaiti","SimSun",serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(name, x, y + 1);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ═══════════════════════ 走法 ═══════════════════════

function inBoard(r,c) { return r>=0 && r<ROWS && c>=0 && c<COLS; }
function inPalace(r,c,color) {
  if (c<3||c>5) return false;
  return color===RED ? (r>=7&&r<=9) : (r>=0&&r<=2);
}

function getMoves(row, col) {
  const piece = board[row][col];
  if (!piece) return [];
  const color = piece.color;
  let raw = [];
  switch (piece.type) {
    case 'general': {
      for (const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
        const nr=row+dr, nc=col+dc;
        if (inPalace(nr,nc,color)) raw.push({row:nr,col:nc});
      }
      break;
    }
    case 'advisor': {
      for (const [dr,dc] of [[1,1],[1,-1],[-1,1],[-1,-1]]) {
        const nr=row+dr, nc=col+dc;
        if (inPalace(nr,nc,color)) raw.push({row:nr,col:nc});
      }
      break;
    }
    case 'elephant': {
      const dirs = [[2,2],[2,-2],[-2,2],[-2,-2]];
      const eyes = [[1,1],[1,-1],[-1,1],[-1,-1]];
      for (let i=0;i<4;i++) {
        const nr=row+dirs[i][0], nc=col+dirs[i][1];
        const er=row+eyes[i][0], ec=col+eyes[i][1];
        if (color===RED && nr<5) continue; if (color===BLACK && nr>4) continue;
        if (inBoard(nr,nc) && !board[er][ec]) raw.push({row:nr,col:nc});
      }
      break;
    }
    case 'horse': {
      const steps = [[[-2,-1],[-1,0]],[[-2,1],[-1,0]],[[-1,-2],[0,-1]],[[-1,2],[0,1]],[[1,-2],[0,-1]],[[1,2],[0,1]],[[2,-1],[1,0]],[[2,1],[1,0]]];
      for (const [mv,bl] of steps) {
        const nr=row+mv[0], nc=col+mv[1];
        const br=row+bl[0], bc=col+bl[1];
        if (inBoard(nr,nc) && !board[br][bc]) raw.push({row:nr,col:nc});
      }
      break;
    }
    case 'rook': {
      for (const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
        let nr=row+dr, nc=col+dc;
        while (inBoard(nr,nc)) {
          if (board[nr][nc]) { if (board[nr][nc].color!==color) raw.push({row:nr,col:nc}); break; }
          raw.push({row:nr,col:nc}); nr+=dr; nc+=dc;
        }
      }
      break;
    }
    case 'cannon': {
      for (const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
        let nr=row+dr, nc=col+dc, jumped=false;
        while (inBoard(nr,nc)) {
          if (!jumped) {
            if (board[nr][nc]) jumped = true;
            else raw.push({row:nr,col:nc});
          } else {
            if (board[nr][nc]) { if (board[nr][nc].color!==color) raw.push({row:nr,col:nc}); break; }
          }
          nr+=dr; nc+=dc;
        }
      }
      break;
    }
    case 'soldier': {
      const fwd = color===RED ? -1 : 1;
      const crossed = color===RED ? (row<=4) : (row>=5);
      const nr = row+fwd;
      if (inBoard(nr,col)) raw.push({row:nr,col:col});
      if (crossed) {
        if (inBoard(row,col-1)) raw.push({row:row,col:col-1});
        if (inBoard(row,col+1)) raw.push({row:row,col:col+1});
      }
      break;
    }
  }

  // 合法性过滤：不能吃自己、不能造成将帅对面、不能让自己被将
  return raw.filter(m => {
    const target = board[m.row][m.col];
    if (target && target.color===color) return false;

    // 模拟
    const captured = board[m.row][m.col];
    board[m.row][m.col] = piece; board[row][col] = null;
    piece.row = m.row; piece.col = m.col;

    const legal = !isGeneralExposed(color) && !isFlyingGeneral();

    // 撤销
    board[row][col] = piece; board[m.row][m.col] = captured;
    piece.row = row; piece.col = col;

    return legal;
  });
}

function findGeneral(color) {
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const p=board[r][c]; if (p&&p.type==='general'&&p.color===color) return {row:r,col:c};
  }
  return null;
}

function isFlyingGeneral() {
  const rg=findGeneral(RED), bg=findGeneral(BLACK);
  if (!rg||!bg||rg.col!==bg.col) return false;
  const min=Math.min(rg.row,bg.row), max=Math.max(rg.row,bg.row);
  for (let r=min+1;r<max;r++) if (board[r][rg.col]) return false;
  return true;
}

function isUnderAttack(row, col, byColor) {
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const p=board[r][c]; if (!p||p.color!==byColor) continue;
    const moves = getRawMoves(r,c);
    if (moves.some(m=>m.row===row&&m.col===col)) return true;
  }
  return false;
}

function getRawMoves(r,c) {
  const piece=board[r][c]; if (!piece) return [];
  const color=piece.color; const moves=[];

  const addDir = (dirs, maxDist, canJump, captureMode) => {
    for (const [dr,dc] of dirs) {
      let nr=r+dr, nc=c+dc, jumped=false;
      for (let d=0; maxDist===-1||d<maxDist; d++) {
        if (!inBoard(nr,nc)) break;
        if (!canJump && board[nr][nc]) {
          moves.push({row:nr,col:nc}); break;
        }
        if (canJump) {
          if (!jumped) {
            moves.push({row:nr,col:nc});
            if (board[nr][nc]) jumped=true;
          } else {
            if (board[nr][nc]) { moves.push({row:nr,col:nc}); break; }
          }
        } else {
          moves.push({row:nr,col:nc});
        }
        nr+=dr; nc+=dc;
      }
    }
  };

  switch (piece.type) {
    case 'general':
      for (const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
        const nr=r+dr,nc=c+dc; if (inPalace(nr,nc,color)) moves.push({row:nr,col:nc});
      }
      break;
    case 'advisor':
      for (const [dr,dc] of [[1,1],[1,-1],[-1,1],[-1,-1]]) {
        const nr=r+dr,nc=c+dc; if (inPalace(nr,nc,color)) moves.push({row:nr,col:nc});
      }
      break;
    case 'elephant': {
      const dirs=[[2,2],[2,-2],[-2,2],[-2,-2]], eyes=[[1,1],[1,-1],[-1,1],[-1,-1]];
      for (let i=0;i<4;i++) {
        const nr=r+dirs[i][0],nc=c+dirs[i][1],er=r+eyes[i][0],ec=c+eyes[i][1];
        if (color===RED&&nr<5) continue; if (color===BLACK&&nr>4) continue;
        if (inBoard(nr,nc)&&!board[er][ec]) moves.push({row:nr,col:nc});
      }
      break;
    }
    case 'horse': {
      const steps=[[[-2,-1],[-1,0]],[[-2,1],[-1,0]],[[-1,-2],[0,-1]],[[-1,2],[0,1]],[[1,-2],[0,-1]],[[1,2],[0,1]],[[2,-1],[1,0]],[[2,1],[1,0]]];
      for (const [mv,bl] of steps) {
        const nr=r+mv[0],nc=c+mv[1],br=r+bl[0],bc=c+bl[1];
        if (inBoard(nr,nc)&&!board[br][bc]) moves.push({row:nr,col:nc});
      }
      break;
    }
    case 'rook': addDir([[0,1],[0,-1],[1,0],[-1,0]], -1, false, true); break;
    case 'cannon': {
      for (const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
        let nr=r+dr,nc=c+dc,jumped=false;
        while (inBoard(nr,nc)) {
          if (!jumped) { moves.push({row:nr,col:nc}); if (board[nr][nc]) jumped=true; }
          else { if (board[nr][nc]) { moves.push({row:nr,col:nc}); break; } }
          nr+=dr; nc+=dc;
        }
      }
      break;
    }
    case 'soldier': {
      const fwd=color===RED?-1:1, crossed=color===RED?(r<=4):(r>=5);
      if (inBoard(r+fwd,c)) moves.push({row:r+fwd,col:c});
      if (crossed) { if (inBoard(r,c-1)) moves.push({row:r,col:c-1}); if (inBoard(r,c+1)) moves.push({row:r,col:c+1}); }
      break;
    }
  }
  return moves;
}

function isGeneralExposed(color) {
  const gen = findGeneral(color); if (!gen) return true;
  return isUnderAttack(gen.row, gen.col, color===RED?BLACK:RED);
}

function hasLegalMoves(color) {
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const p=board[r][c]; if (!p||p.color!==color) continue;
    if (getMoves(r,c).length>0) return true;
  }
  return false;
}

// ═══════════════════════ 游戏逻辑 ═══════════════════════

function handleClick(clientX, clientY) {
  if (gameOver) return;
  if (gameMode==='online' && currentTurn!==myColor) {
    document.getElementById('message').textContent = '⏳ 等待对方走棋...';
    return;
  }

  const pos = getBoardPos(clientX, clientY);
  if (!pos) return;
  const {row,col}=pos;

  const clicked = board[row][col];

  if (selectedPiece) {
    if (clicked && clicked.color===currentTurn) {
      selectedPiece={row,col}; validMoves=getMoves(row,col); drawBoard();
      document.getElementById('message').textContent = PIECE_NAMES[currentTurn][clicked.type]+' 已选中';
      return;
    }
    if (validMoves.some(m=>m.row===row&&m.col===col)) {
      doMove(selectedPiece.row, selectedPiece.col, row, col);
      selectedPiece=null; validMoves=[];
      return;
    }
    selectedPiece=null; validMoves=[]; drawBoard();
    document.getElementById('message').textContent='已取消选择';
    return;
  }

  if (clicked && clicked.color===currentTurn) {
    selectedPiece={row,col}; validMoves=getMoves(row,col); drawBoard();
    document.getElementById('message').textContent=PIECE_NAMES[currentTurn][clicked.type]+' 已选中';
  }
}

function getBoardPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scale = (canvas.width/(window.devicePixelRatio||1))/rect.width;
  const x=(clientX-rect.left)*scale, y=(clientY-rect.top)*scale;
  const col=Math.round((x-PAD)/cellSize), row=Math.round((y-PAD)/cellSize);
  if (row<0||row>=ROWS||col<0||col>=COLS) return null;
  if (Math.abs(x-(PAD+col*cellSize))>cellSize*0.45||Math.abs(y-(PAD+row*cellSize))>cellSize*0.45) return null;
  return {row,col};
}

function doMove(fromR, fromC, toR, toC) {
  const piece=board[fromR][fromC];
  const captured=board[toR][toC];
  board[toR][toC]=piece; board[fromR][fromC]=null;
  piece.row=toR; piece.col=toC;

  const nextTurn = currentTurn===RED?BLACK:RED;
  currentTurn = nextTurn;

  // 检测胜负
  const inCheck = isInCheck(nextTurn);
  const hasLegal = hasLegalMoves(nextTurn);

  if (!hasLegal) {
    gameOver = true;
    const winner = nextTurn===RED?'黑方':'红方';
    document.getElementById('turn-indicator').className='over';
    document.getElementById('turn-indicator').textContent=`🏆 ${winner}胜！`;
    document.getElementById('message').textContent=`${winner}获胜！`;
    drawBoard();
    // 联网通知对方
    if (gameMode==='online'&&conn) sendMsg({type:'gameover', winner:winner});
    return;
  }

  if (inCheck) {
    document.getElementById('message').textContent=`⚠️ 将军！${nextTurn===RED?'红方':'黑方'} 被将军！`;
  } else {
    document.getElementById('message').textContent=`轮到 ${nextTurn===RED?'红方':'黑方'} 走棋`;
  }

  updateTurnUI(nextTurn, inCheck);
  drawBoard();

  // 联网：发送走法
  if (gameMode==='online'&&conn) {
    sendMsg({type:'move', from:{row:fromR,col:fromC}, to:{row:toR,col:toC}});
  }
}

function isInCheck(color) {
  const gen=findGeneral(color); if (!gen) return true;
  return isUnderAttack(gen.row, gen.col, color===RED?BLACK:RED);
}

function updateTurnUI(turn, check) {
  const el = document.getElementById('turn-indicator');
  el.className = turn;
  el.textContent = turn===RED ? '🔴 红方走' : '⚫ 黑方走';
}

// ═══════════════════════ 模式切换 ═══════════════════════

function startLocal() {
  gameMode='local';
  document.getElementById('mode-select').classList.add('hidden');
  document.getElementById('room-panel').classList.add('hidden');
  document.getElementById('game-area').classList.remove('hidden');
  document.getElementById('room-bar').classList.add('hidden');
  resetGame();
}

function backToMenu() {
  if (peer) { peer.destroy(); peer=null; }
  if (conn) { conn.close(); conn=null; }
  document.getElementById('mode-select').classList.remove('hidden');
  document.getElementById('room-panel').classList.add('hidden');
  document.getElementById('game-area').classList.add('hidden');
  document.getElementById('room-created').classList.add('hidden');
  document.getElementById('room-joining').classList.add('hidden');
  document.getElementById('room-status').textContent='';
  document.getElementById('room-status').className='';
  gameMode='local';
}

function showRoomPanel() {
  document.getElementById('mode-select').classList.add('hidden');
  document.getElementById('room-panel').classList.remove('hidden');
}

// ═══════════════════════ 联网 ═══════════════════════

function createRoom() {
  isCreator = true;
  roomCode = Math.floor(1000 + Math.random()*9000).toString();
  document.getElementById('room-code-text').textContent = roomCode;
  document.getElementById('room-created').classList.remove('hidden');
  document.getElementById('room-joining').classList.add('hidden');
  document.getElementById('room-status').textContent = '⏳ 创建中...';
  document.getElementById('room-status').className = 'connecting';

  try {
    peer = new Peer('xiangqi-'+roomCode, {
      debug: 0
    });

    peer.on('open', (id) => {
      document.getElementById('room-status').textContent = '✅ 房间已创建，等待对方加入...';
      document.getElementById('room-status').className = 'connected';
    });

    peer.on('connection', (newConn) => {
      conn = newConn;
      conn.on('open', () => {
        opponentConnected = true;
        myColor = RED;
        startOnlineGame();
      });
      conn.on('data', handleMsg);
      conn.on('close', () => {
        opponentConnected = false;
        document.getElementById('opp-status').textContent = '❌ 对手已断开';
        document.getElementById('opp-dot').className = 'opp-dot offline';
        document.getElementById('message').textContent = '对手已断开连接';
      });
    });

    peer.on('error', (err) => {
      if (err.type === 'unavailable-id') {
        document.getElementById('room-status').textContent = '❌ 房间号被占用，换个试试';
        document.getElementById('room-status').className = 'error';
      } else {
        document.getElementById('room-status').textContent = '❌ 连接失败: '+err.type;
        document.getElementById('room-status').className = 'error';
      }
    });
  } catch(e) {
    document.getElementById('room-status').textContent = '❌ 创建失败: '+e.message;
    document.getElementById('room-status').className = 'error';
  }
}

function joinRoom() {
  const code = document.getElementById('room-code-input').value.trim();
  if (!code || code.length<4) {
    document.getElementById('room-status').textContent = '⚠️ 请输入有效的房间号';
    document.getElementById('room-status').className = 'error';
    return;
  }
  roomCode = code;
  isCreator = false;
  document.getElementById('room-created').classList.add('hidden');
  document.getElementById('room-joining').classList.remove('hidden');
  document.getElementById('room-status').textContent = '⏳ 连接中...';
  document.getElementById('room-status').className = 'connecting';

  try {
    peer = new Peer(undefined, { debug: 0 });

    peer.on('open', (id) => {
      conn = peer.connect('xiangqi-'+roomCode, { reliable: true });
      conn.on('open', () => {
        opponentConnected = true;
        myColor = BLACK;
        startOnlineGame();
      });
      conn.on('data', handleMsg);
      conn.on('close', () => {
        opponentConnected = false;
        document.getElementById('opp-status').textContent = '❌ 对手已断开';
        document.getElementById('opp-dot').className = 'opp-dot offline';
        document.getElementById('message').textContent = '对手已断开连接';
      });
    });

    peer.on('error', (err) => {
      document.getElementById('room-status').textContent = '❌ 连接失败: '+err.type;
      document.getElementById('room-status').className = 'error';
      document.getElementById('room-joining').classList.add('hidden');
    });
  } catch(e) {
    document.getElementById('room-status').textContent = '❌ 连接失败: '+e.message;
    document.getElementById('room-status').className = 'error';
    document.getElementById('room-joining').classList.add('hidden');
  }
}

function startOnlineGame() {
  gameMode = 'online';
  document.getElementById('mode-select').classList.add('hidden');
  document.getElementById('room-panel').classList.add('hidden');
  document.getElementById('room-created').classList.add('hidden');
  document.getElementById('room-joining').classList.add('hidden');
  document.getElementById('game-area').classList.remove('hidden');
  document.getElementById('room-bar').classList.remove('hidden');
  document.getElementById('room-info-code').textContent = roomCode;
  document.getElementById('opp-status').textContent = '✅ 对手已连接';
  document.getElementById('opp-dot').className = 'opp-dot online';

  // 显示自己的颜色
  const colorName = myColor===RED ? '红方（先手）' : '黑方（后手）';
  document.getElementById('message').textContent = `你是 ${colorName}`;

  resetGame();

  // 联网模式下，后手不能操作
  if (myColor === BLACK) {
    document.getElementById('turn-indicator').className = 'black';
    document.getElementById('turn-indicator').textContent = '⚫ 黑方走';
  }
}

function handleMsg(data) {
  try {
    const msg = typeof data === 'string' ? JSON.parse(data) : data;
    switch (msg.type) {
      case 'move':
        // 对方走棋
        if (gameMode==='online') {
          doMoveRemote(msg.from.row, msg.from.col, msg.to.row, msg.to.col);
        }
        break;
      case 'gameover':
        document.getElementById('message').textContent = `🏆 ${msg.winner}获胜！`;
        gameOver = true;
        document.getElementById('turn-indicator').className='over';
        document.getElementById('turn-indicator').textContent=`🏆 ${msg.winner}胜！`;
        drawBoard();
        break;
      case 'reset':
        resetGame();
        break;
    }
  } catch(e) {}
}

function doMoveRemote(fromR, fromC, toR, toC) {
  const piece=board[fromR][fromC];
  const captured=board[toR][toC];
  board[toR][toC]=piece; board[fromR][fromC]=null;
  piece.row=toR; piece.col=toC;

  currentTurn = currentTurn===RED?BLACK:RED;

  const inCheck = isInCheck(currentTurn);
  const hasLegal = hasLegalMoves(currentTurn);

  if (!hasLegal) {
    gameOver = true;
    const winner = currentTurn===RED?'黑方':'红方';
    document.getElementById('turn-indicator').className='over';
    document.getElementById('turn-indicator').textContent=`🏆 ${winner}胜！`;
    document.getElementById('message').textContent=`${winner}获胜！`;
    drawBoard();
    return;
  }

  if (inCheck) {
    document.getElementById('message').textContent=`⚠️ 将军！${currentTurn===RED?'红方':'黑方'} 被将军！`;
  } else {
    document.getElementById('message').textContent=`轮到 ${currentTurn===RED?'红方':'黑方'} 走棋`;
  }

  updateTurnUI(currentTurn, inCheck);
  drawBoard();
}

function sendMsg(msg) {
  if (conn && conn.open) {
    conn.send(JSON.stringify(msg));
  }
}

// ═══════════════════════ 通用 ═══════════════════════

function resetGame() {
  initBoard();
  selectedPiece=null; validMoves=[]; gameOver=false;
  if (gameMode!=='online') currentTurn=RED;
  // 联网时保留 currentTurn（由创建者先走）

  document.getElementById('turn-indicator').className = currentTurn;
  document.getElementById('turn-indicator').textContent = currentTurn===RED?'🔴 红方走':'⚫ 黑方走';
  document.getElementById('message').textContent = '点击棋子选中，点击目标移动';
  drawBoard();
}

function showLeaveModal() {
  const text = gameMode==='online' ? '退出将断开与对手的连接，确定吗？' : '确定退出当前对局吗？';
  document.getElementById('leave-modal-text').textContent = text;
  document.getElementById('leave-modal').classList.add('active');
}

function closeModal() {
  document.getElementById('leave-modal').classList.remove('active');
}

function confirmLeave() {
  closeModal();
  if (conn) { conn.close(); conn=null; }
  if (peer) { peer.destroy(); peer=null; }
  backToMenu();
}

// ═══════════════════════ 事件 ═══════════════════════

document.addEventListener('DOMContentLoaded', function() {
  setupCanvas();
  window.addEventListener('resize', resizeCanvasInternal);
});

canvas.addEventListener('click', function(e) { handleClick(e.clientX, e.clientY); });
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  const t = e.touches[0];
  handleClick(t.clientX, t.clientY);
});
</script>
