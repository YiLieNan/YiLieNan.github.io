<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  中国象棋 —— 完整实现
// ═══════════════════════════════════════════════════════

const ROWS = 10, COLS = 9;
const RED = 'red', BLACK = 'black';

const NAMES = {
  red:    { general:'帅', advisor:'仕', elephant:'相', horse:'马', rook:'车', cannon:'炮', soldier:'兵' },
  black:  { general:'将', advisor:'士', elephant:'象', horse:'马', rook:'车', cannon:'炮', soldier:'卒' }
};

// ── 棋盘状态 ──
let board = [];           // 10x9, null 或 {type,color,row,col}
let selected = null;      // {row,col} 或 null
let validMoves = [];      // [{row,col}]
let turn = RED;
let gameOver = false;

// ── 模式 ──
let mode = 'local';
let peer = null, conn = null;
let isCreator = false, roomCode = '';
let myColor = RED;

// ── Canvas ──
let canvas, ctx;
let cellSize = 0;
let boardOriginX = 0, boardOriginY = 0;  // 棋盘左上角在 canvas 中的 CSS 坐标
const PAD = 40;

// ═══════════════════════════════════════════
//  棋盘初始化
// ═══════════════════════════════════════════

function initBoard() {
  board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
  const p = (r,c,type,color) => { board[r][c] = {type,color,row:r,col:c}; };

  // 黑方（上方 row 0-4）
  p(0,0,'rook',BLACK); p(0,1,'horse',BLACK); p(0,2,'elephant',BLACK);
  p(0,3,'advisor',BLACK); p(0,4,'general',BLACK);
  p(0,5,'advisor',BLACK); p(0,6,'elephant',BLACK);
  p(0,7,'horse',BLACK); p(0,8,'rook',BLACK);
  p(2,1,'cannon',BLACK); p(2,7,'cannon',BLACK);
  for (let c=0;c<9;c+=2) p(3,c,'soldier',BLACK);

  // 红方（下方 row 5-9）
  p(9,0,'rook',RED); p(9,1,'horse',RED); p(9,2,'elephant',RED);
  p(9,3,'advisor',RED); p(9,4,'general',RED);
  p(9,5,'advisor',RED); p(9,6,'elephant',RED);
  p(9,7,'horse',RED); p(9,8,'rook',RED);
  p(7,1,'cannon',RED); p(7,7,'cannon',RED);
  for (let c=0;c<9;c+=2) p(6,c,'soldier',RED);
}

// ═══════════════════════════════════════════
//  Canvas 绘制
// ═══════════════════════════════════════════

function setupCanvas() {
  canvas = document.getElementById('boardCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
}

function resizeCanvas() {
  const wrap = canvas.parentElement;
  let pw = wrap.clientWidth - 16;
  if (pw < 100) pw = 520;

  const size = Math.min(pw, 520);
  const dpr = window.devicePixelRatio || 1;

  // cellSize: 以高度为准（9个间距），宽度8个间距自动适配
  cellSize = (size - PAD * 2) / 9;
  const boardPixelW = PAD * 2 + 8 * cellSize;

  canvas.style.width = boardPixelW + 'px';
  canvas.style.height = size + 'px';
  canvas.width = boardPixelW * dpr;
  canvas.height = size * dpr;

  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr, dpr);

  boardOriginX = PAD;          // 棋盘左边缘 = PAD
  boardOriginY = PAD;         // 棋盘上边缘（row 0）在 PAD 处

  drawBoard();
}

function drawBoard() {
  const W = canvas.width  / (window.devicePixelRatio||1);
  const H = canvas.height / (window.devicePixelRatio||1);
  ctx.clearRect(0,0,W,H);

  const s = cellSize;
  const ox = boardOriginX, oy = boardOriginY;

  // ── 背景 ──
  const grad = ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#f5e6c8'); grad.addColorStop(1,'#e8d5a3');
  ctx.fillStyle = grad;
  roundRect(ctx,0,0,W,H,12); ctx.fill();

  ctx.strokeStyle = '#5a4a3a'; ctx.lineWidth = 1;

  // ── 横线 10条 ──
  for (let r=0;r<ROWS;r++) {
    ctx.beginPath(); ctx.moveTo(ox, oy+r*s); ctx.lineTo(ox+8*s, oy+r*s); ctx.stroke();
  }
  // ── 竖线 ──
  for (let c=0;c<COLS;c++) {
    if (c===0||c===8) {
      ctx.beginPath(); ctx.moveTo(ox+c*s, oy); ctx.lineTo(ox+c*s, oy+9*s); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(ox+c*s, oy); ctx.lineTo(ox+c*s, oy+4*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ox+c*s, oy+5*s); ctx.lineTo(ox+c*s, oy+9*s); ctx.stroke();
    }
  }
  // ── 九宫斜线 ──
  ctx.beginPath(); ctx.moveTo(ox+3*s,oy); ctx.lineTo(ox+5*s,oy+2*s);
  ctx.moveTo(ox+5*s,oy); ctx.lineTo(ox+3*s,oy+2*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox+3*s,oy+7*s); ctx.lineTo(ox+5*s,oy+9*s);
  ctx.moveTo(ox+5*s,oy+7*s); ctx.lineTo(ox+3*s,oy+9*s); ctx.stroke();

  // ── 河界 ──
  ctx.fillStyle = '#5a4a3a';
  ctx.font = `${s*0.45}px "KaiTi","STKaiti",serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const riverY = oy+4.5*s;
  ctx.fillText('楚  河', ox+2*s, riverY);
  ctx.fillText('汉  界', ox+6*s, riverY);

  // ── 炮兵位标记 ──
  const marks = [[2,1],[2,7],[7,1],[7,7],[3,0],[3,2],[3,4],[3,6],[3,8],[6,0],[6,2],[6,4],[6,6],[6,8]];
  for (const [r,c] of marks) drawCross(ox+c*s, oy+r*s, s);

  // ── 棋子 ──
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const p=board[r][c];
    if (!p) continue;
    const x=ox+c*s, y=oy+r*s;
    const sel = selected && selected.row===r && selected.col===c;
    drawCircle(x,y,s,p,sel);
  }

  // ── 走法提示 ──
  for (const m of validMoves) {
    const x=ox+m.col*s, y=oy+m.row*s;
    const has = !!board[m.row][m.col];
    ctx.beginPath(); ctx.arc(x,y, s*0.12, 0, Math.PI*2);
    ctx.fillStyle = has ? 'rgba(231,76,60,.3)' : 'rgba(46,204,113,.4)'; ctx.fill();
    if (has) {
      ctx.beginPath(); ctx.arc(x,y, s*0.38, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(231,76,60,.5)'; ctx.lineWidth=2; ctx.stroke();
    }
  }
}

function drawCross(x,y,s) {
  const g=s*0.1, len=s*0.13;
  ctx.strokeStyle='#5a4a3a'; ctx.lineWidth=1;
  for (const [dx,dy] of [[-1,-1],[1,-1],[-1,1],[1,1]]) {
    ctx.beginPath();
    ctx.moveTo(x+dx*g, y+dy*(g+len));
    ctx.lineTo(x+dx*(g+len), y+dy*g);
    ctx.lineTo(x+dx*(g+len*0.3), y+dy*(g+len*0.3));
    ctx.stroke();
  }
}

function drawCircle(x,y,s,piece,sel) {
  const r=s*0.42;
  const name = NAMES[piece.color][piece.type];
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.2)'; ctx.shadowBlur=6; ctx.shadowOffsetX=2; ctx.shadowOffsetY=2;

  const grad=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
  if (piece.color===RED) {
    grad.addColorStop(0,'#fff5f0'); grad.addColorStop(.7,'#fce4d6'); grad.addColorStop(1,'#f5c6b0');
  } else {
    grad.addColorStop(0,'#f0f0f5'); grad.addColorStop(.7,'#e0e0e8'); grad.addColorStop(1,'#c8c8d5');
  }

  ctx.shadowColor='transparent';
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();
  ctx.strokeStyle=piece.color===RED?'#c0392b':'#3a3a5a'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,r*0.85,0,Math.PI*2);
  ctx.strokeStyle=piece.color===RED?'#c0392b':'#3a3a5a'; ctx.lineWidth=1; ctx.stroke();

  if (sel) {
    ctx.beginPath(); ctx.arc(x,y,r+3,0,Math.PI*2);
    ctx.strokeStyle='#3498db'; ctx.lineWidth=3; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
  }

  ctx.restore();
  ctx.fillStyle=piece.color===RED?'#c0392b':'#2d2d4a';
  ctx.font=`bold ${s*0.38}px "KaiTi","STKaiti","SimSun",serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(name,x,y+1);
}

function roundRect(ctx,x,y,w,h,r) {
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ═══════════════════════════════════════════
//  坐标转换  (clientX/Y → 棋盘行列)
// ═══════════════════════════════════════════

function clientToBoard(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scale = (canvas.width/(window.devicePixelRatio||1)) / rect.width;
  const x = (clientX - rect.left) * scale;
  const y = (clientY - rect.top) * scale;

  const s = cellSize;
  const ox = boardOriginX, oy = boardOriginY;

  const col = Math.round((x - ox) / s);
  const row = Math.round((y - oy) / s);

  if (row<0||row>=ROWS||col<0||col>=COLS) return null;
  if (Math.abs(x-(ox+col*s)) > s*0.44) return null;
  if (Math.abs(y-(oy+row*s)) > s*0.44) return null;

  return {row,col};
}

// ═══════════════════════════════════════════
//  走法生成 —— 核心逻辑
// ═══════════════════════════════════════════

function inBoard(r,c) { return r>=0&&r<ROWS&&c>=0&&c<COLS; }
function inPalace(r,c,color) {
  if (c<3||c>5) return false;
  return color===RED ? (r>=7&&r<=9) : (r>=0&&r<=2);
}
function ownSide(r,color) {
  return color===RED ? (r>=5) : (r<=4);
}

// 生成走法（不含合法性过滤）
function rawMoves(r,c) {
  const p=board[r][c];
  if (!p) return [];
  const color=p.color;
  const res = [];

  switch (p.type) {

    case 'general': {
      for (const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
        const nr=r+dr, nc=c+dc;
        if (inPalace(nr,nc,color)) res.push({row:nr,col:nc});
      }
      break;
    }

    case 'advisor': {
      for (const [dr,dc] of [[1,1],[1,-1],[-1,1],[-1,-1]]) {
        const nr=r+dr, nc=c+dc;
        if (inPalace(nr,nc,color)) res.push({row:nr,col:nc});
      }
      break;
    }

    case 'elephant': {
      const dirs = [[2,2],[2,-2],[-2,2],[-2,-2]];
      const eyes = [[1,1],[1,-1],[-1,1],[-1,-1]];
      for (let i=0;i<4;i++) {
        const nr=r+dirs[i][0], nc=c+dirs[i][1];
        const er=r+eyes[i][0], ec=c+eyes[i][1];
        if (color===RED && nr<5) continue;
        if (color===BLACK && nr>4) continue;
        if (inBoard(nr,nc) && !board[er][ec]) res.push({row:nr,col:nc});
      }
      break;
    }

    case 'horse': {
      // 马走日，8个方向 [移动, 蹩腿]
      const STEPS = [
        [[-2,-1],[-1,0]], [[-2,1],[-1,0]],
        [[-1,-2],[0,-1]], [[-1,2],[0,1]],
        [[1,-2],[0,-1]], [[1,2],[0,1]],
        [[2,-1],[1,0]], [[2,1],[1,0]]
      ];
      for (const [mv,bl] of STEPS) {
        const nr=r+mv[0], nc=c+mv[1];
        const br=r+bl[0], bc=c+bl[1];
        if (inBoard(nr,nc) && inBoard(br,bc) && !board[br][bc]) res.push({row:nr,col:nc});
      }
      break;
    }

    case 'rook': {
      for (const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
        let nr=r+dr, nc=c+dc;
        while (inBoard(nr,nc)) {
          if (board[nr][nc]) {
            res.push({row:nr,col:nc}); // 可吃
            break;
          }
          res.push({row:nr,col:nc});
          nr+=dr; nc+=dc;
        }
      }
      break;
    }

    case 'cannon': {
      for (const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
        let nr=r+dr, nc=c+dc;
        let jumped = false;
        while (inBoard(nr,nc)) {
          if (!jumped) {
            if (board[nr][nc]) {
              jumped = true;
            } else {
              res.push({row:nr,col:nc}); // 走
            }
          } else {
            if (board[nr][nc]) {
              res.push({row:nr,col:nc}); // 吃（翻山）
              break;
            }
          }
          nr+=dr; nc+=dc;
        }
      }
      break;
    }

    case 'soldier': {
      const fwd = color===RED ? -1 : 1;
      const crossed = !ownSide(r,color); // 过河了？
      // 前
      const nr = r+fwd;
      if (inBoard(nr,c)) res.push({row:nr,col:c});
      // 过河后可左右
      if (crossed) {
        if (inBoard(r,c-1)) res.push({row:r,col:c-1});
        if (inBoard(r,c+1)) res.push({row:r,col:c+1});
      }
      break;
    }
  }

  return res;
}

// 找出某方将/帅
function findGeneral(color) {
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const p=board[r][c];
    if (p && p.type==='general' && p.color===color) return {row:r,col:c};
  }
  return null;
}

// 将帅对面检测
function flyingGeneral() {
  const rg=findGeneral(RED), bg=findGeneral(BLACK);
  if (!rg||!bg||rg.col!==bg.col) return false;
  const min=Math.min(rg.row,bg.row), max=Math.max(rg.row,bg.row);
  for (let r=min+1;r<max;r++) if (board[r][rg.col]) return false;
  return true;
}

// 模拟走一步，返回是否合法
function simulate(fromR,fromC,toR,toC) {
  const piece=board[fromR][fromC];
  const captured=board[toR][toC];

  board[toR][toC]=piece; board[fromR][fromC]=null;
  piece.row=toR; piece.col=toC;

  // 检查：走后不能让自己被将，不能将帅对面
  const gen = findGeneral(piece.color);
  const underAttack = gen && isAttackedBy(gen.row, gen.col, piece.color===RED?BLACK:RED);
  const fg = flyingGeneral();

  // 撤销
  board[fromR][fromC]=piece; board[toR][toC]=captured;
  piece.row=fromR; piece.col=fromC;

  return !underAttack && !fg;
}

// 目标位置是否被指定颜色攻击
function isAttackedBy(row, col, attackerColor) {
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const p=board[r][c];
    if (!p||p.color!==attackerColor) continue;
    const moves = rawMoves(r,c);
    for (const m of moves) {
      if (m.row===row && m.col===col) return true;
    }
  }
  return false;
}

// 获取合法走法（含合法性过滤）
function legalMoves(r,c) {
  const p=board[r][c];
  if (!p) return [];
  const raw = rawMoves(r,c);
  return raw.filter(m => {
    const target=board[m.row][m.col];
    if (target && target.color===p.color) return false; // 不能吃自己
    return simulate(r,c,m.row,m.col);
  });
}

// 某方是否被将
function inCheck(color) {
  const gen=findGeneral(color);
  if (!gen) return true;
  return isAttackedBy(gen.row, gen.col, color===RED?BLACK:RED);
}

// 某方是否有合法走法
function hasLegal(color) {
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const p=board[r][c];
    if (!p||p.color!==color) continue;
    if (legalMoves(r,c).length>0) return true;
  }
  return false;
}

// ═══════════════════════════════════════════
//  游戏逻辑
// ═══════════════════════════════════════════

function handleClick(clientX, clientY) {
  if (gameOver) {
    document.getElementById('message').textContent = '🏁 对局已结束，点「新局」再开一局';
    return;
  }
  if (mode==='online' && turn!==myColor) {
    document.getElementById('message').textContent = '⏳ 等待对方走棋...';
    return;
  }

  const pos = clientToBoard(clientX, clientY);
  if (!pos) return;
  const {row,col} = pos;
  const clicked = board[row][col];

  // 已有选中棋子
  if (selected) {
    // 点自己的另一个棋子 → 切换选中
    if (clicked && clicked.color===turn) {
      selected = {row,col};
      validMoves = legalMoves(row,col);
      drawBoard();
      document.getElementById('message').textContent = NAMES[turn][clicked.type]+' 已选中';
      return;
    }
    // 点有效走法 → 走棋
    const isLegal = validMoves.some(m=>m.row===row&&m.col===col);
    if (isLegal) {
      doMove(selected.row, selected.col, row, col);
      selected=null; validMoves=[];
      return;
    }
    // 点击无效 → 取消
    selected=null; validMoves=[]; drawBoard();
    document.getElementById('message').textContent='已取消选择';
    return;
  }

  // 未选中：选自己的棋子
  if (clicked && clicked.color===turn) {
    selected = {row,col};
    validMoves = legalMoves(row,col);
    drawBoard();
    document.getElementById('message').textContent = NAMES[turn][clicked.type]+' 已选中';
  } else {
    document.getElementById('message').textContent = `轮到 ${turn===RED?'红方':'黑方'}`;
  }
}

function doMove(fromR, fromC, toR, toC) {
  const piece=board[fromR][fromC];
  const captured=board[toR][toC];

  board[toR][toC]=piece; board[fromR][fromC]=null;
  piece.row=toR; piece.col=toC;

  // 换手
  const next = turn===RED ? BLACK : RED;
  turn = next;

  // 检测结果
  const check = inCheck(next);
  const legal = hasLegal(next);

  if (!legal) {
    gameOver = true;
    const winner = next===RED ? '黑方' : '红方';
    document.getElementById('turn-indicator').className='over';
    document.getElementById('turn-indicator').textContent=`🏆 ${winner}胜！`;
    document.getElementById('message').textContent=`🏆 ${winner}获胜！`;
    drawBoard();
    if (mode==='online' && conn) sendMsg({type:'gameover', winner});
    return;
  }

  updateTurnUI(next, check);
  drawBoard();

  if (mode==='online' && conn) {
    sendMsg({type:'move', from:{row:fromR,col:fromC}, to:{row:toR,col:toC}});
  }
}

function doMoveRemote(fromR, fromC, toR, toC) {
  const piece=board[fromR][fromC];
  board[toR][toC]=piece; board[fromR][fromC]=null;
  piece.row=toR; piece.col=toC;

  turn = turn===RED ? BLACK : RED;
  const check = inCheck(turn);
  const legal = hasLegal(turn);

  if (!legal) {
    gameOver = true;
    const winner = turn===RED ? '黑方' : '红方';
    document.getElementById('turn-indicator').className='over';
    document.getElementById('turn-indicator').textContent=`🏆 ${winner}胜！`;
    document.getElementById('message').textContent=`🏆 ${winner}获胜！`;
    drawBoard();
    return;
  }

  updateTurnUI(turn, check);
  drawBoard();
}

function updateTurnUI(t, check) {
  const el = document.getElementById('turn-indicator');
  el.className = t;
  el.textContent = t===RED ? '🔴 红方走' : '⚫ 黑方走';
  document.getElementById('message').textContent = check
    ? `⚠️ 将军！${t===RED?'红方':'黑方'}被将军！`
    : `轮到 ${t===RED?'红方':'黑方'} 走棋`;
}

function resetGame() {
  initBoard();
  selected=null; validMoves=[]; gameOver=false;
  if (mode!=='online') turn=RED;

  document.getElementById('turn-indicator').className = turn;
  document.getElementById('turn-indicator').textContent = turn===RED?'🔴 红方走':'⚫ 黑方走';
  document.getElementById('message').textContent = '点击棋子选中，点击目标移动';
  drawBoard();
}

// ═══════════════════════════════════════════
//  模式切换
// ═══════════════════════════════════════════

function startLocal() {
  mode='local';
  document.getElementById('mode-select').classList.add('hidden');
  document.getElementById('room-panel').classList.add('hidden');
  document.getElementById('game-area').classList.remove('hidden');
  document.getElementById('room-bar').classList.add('hidden');
  setTimeout(() => { resizeCanvas(); resetGame(); }, 60);
}

function backToMenu() {
  if (peer){peer.destroy();peer=null}
  if (conn){conn.close();conn=null}
  document.getElementById('mode-select').classList.remove('hidden');
  document.getElementById('room-panel').classList.add('hidden');
  document.getElementById('game-area').classList.add('hidden');
  document.getElementById('room-created-box').classList.add('hidden');
  document.getElementById('room-status').textContent='';
  document.getElementById('room-status').className='';
  mode='local';
}

function showRoomPanel() {
  document.getElementById('mode-select').classList.add('hidden');
  document.getElementById('room-panel').classList.remove('hidden');
}

// ═══════════════════════════════════════════
//  联网
// ═══════════════════════════════════════════

function createRoom() {
  isCreator = true;
  roomCode = String(Math.floor(1000+Math.random()*9000));
  document.getElementById('room-code-text').textContent = roomCode;
  document.getElementById('room-created-box').classList.remove('hidden');
  document.getElementById('room-status').textContent = '⏳ 创建中...';
  document.getElementById('room-status').className = 'connecting';

  try {
    peer = new Peer('xiangqi-'+roomCode, {debug:0});
    peer.on('open', id => {
      document.getElementById('room-status').textContent = '✅ 已创建，等待对方加入...';
      document.getElementById('room-status').className = 'connected';
    });
    peer.on('connection', c => {
      conn = c;
      conn.on('open', () => {
        myColor = RED;
        startOnlineGame();
      });
      conn.on('data', handleMsg);
      conn.on('close', ()=>{
        document.getElementById('opp-status').textContent = '❌ 对手已断开';
        document.getElementById('opp-dot').className = 'opp-dot offline';
        document.getElementById('message').textContent = '对手已断开连接';
      });
    });
    peer.on('error', err => {
      if (err.type==='unavailable-id') {
        document.getElementById('room-status').textContent = '❌ 房间号被占用，重试';
      } else {
        document.getElementById('room-status').textContent = '❌ 错误: '+err.type;
      }
      document.getElementById('room-status').className = 'error';
    });
  } catch(e) {
    document.getElementById('room-status').textContent = '❌ 创建失败: '+e.message;
    document.getElementById('room-status').className = 'error';
  }
}

function joinRoom() {
  const code = document.getElementById('room-code-input').value.trim();
  if (!code||code.length!==4) {
    document.getElementById('room-status').textContent = '⚠️ 输入4位房间号';
    document.getElementById('room-status').className = 'error';
    return;
  }
  roomCode = code;
  isCreator = false;
  document.getElementById('room-status').textContent = '⏳ 连接中...';
  document.getElementById('room-status').className = 'connecting';

  try {
    peer = new Peer(undefined, {debug:0});
    peer.on('open', id => {
      conn = peer.connect('xiangqi-'+roomCode, {reliable:true});
      conn.on('open', () => {
        document.getElementById('room-created-box').classList.add('hidden');
        myColor = BLACK;
        startOnlineGame();
      });
      conn.on('data', handleMsg);
      conn.on('close', ()=>{
        document.getElementById('opp-status').textContent = '❌ 对手已断开';
        document.getElementById('opp-dot').className = 'opp-dot offline';
      });
    });
    peer.on('error', err => {
      document.getElementById('room-status').textContent = '❌ 连接失败: '+err.type;
      document.getElementById('room-status').className = 'error';
    });
  } catch(e) {
    document.getElementById('room-status').textContent = '❌ 连接失败: '+e.message;
    document.getElementById('room-status').className = 'error';
  }
}

function startOnlineGame() {
  mode = 'online';
  document.getElementById('mode-select').classList.add('hidden');
  document.getElementById('room-panel').classList.add('hidden');
  document.getElementById('room-created-box').classList.add('hidden');
  document.getElementById('game-area').classList.remove('hidden');
  document.getElementById('room-bar').classList.remove('hidden');
  document.getElementById('room-info-code').textContent = roomCode;
  document.getElementById('opp-status').textContent = '✅ 已连接';
  document.getElementById('opp-dot').className = 'opp-dot online';

  const colorName = myColor===RED?'红方（先手）':'黑方（后手）';
  setTimeout(() => { resizeCanvas(); resetGame(); }, 60);
  document.getElementById('message').textContent = '你是 '+colorName;
}

function handleMsg(data) {
  try {
    const msg = typeof data==='string' ? JSON.parse(data) : data;
    switch (msg.type) {
      case 'move': doMoveRemote(msg.from.row,msg.from.col,msg.to.row,msg.to.col); break;
      case 'gameover':
        gameOver=true;
        document.getElementById('turn-indicator').className='over';
        document.getElementById('turn-indicator').textContent='🏆 '+msg.winner+'胜！';
        document.getElementById('message').textContent='🏆 '+msg.winner+'获胜！';
        drawBoard();
        break;
    }
  } catch(e){}
}

function sendMsg(msg) {
  if (conn && conn.open) conn.send(JSON.stringify(msg));
}

// ═══════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════

function showLeaveModal() {
  document.getElementById('leave-modal-text').textContent =
    mode==='online' ? '退出将断开与对手的连接' : '确定退出吗？';
  document.getElementById('leave-modal').classList.add('active');
}
function closeModal() { document.getElementById('leave-modal').classList.remove('active'); }
function confirmLeave() {
  closeModal();
  if (conn){conn.close();conn=null}
  if (peer){peer.destroy();peer=null}
  backToMenu();
}

// ═══════════════════════════════════════════
//  事件绑定
// ═══════════════════════════════════════════

document.addEventListener('DOMContentLoaded', function() {
  setupCanvas();

  window.addEventListener('resize', () => {
    // 只在游戏区域可见时重绘
    if (!document.getElementById('game-area').classList.contains('hidden')) {
      resizeCanvas();
    }
  });

  canvas.addEventListener('click', e => handleClick(e.clientX, e.clientY));
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    handleClick(t.clientX, t.clientY);
  }, {passive:false});
});
</script>
