name: Deploy to GitHub Pages + Upyun

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx hexo generate
      - run: touch ./public/.nojekyll

      # 同步到又拍云
      - name: Sync to Upyun
        env:
          UPYUN_PASSWORD: ${{ secrets.UPYUN_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          lftp -c "set ftp:ssl-allow no; set net:timeout 30; set net:max-retries 3; open -u yileina/yilienan-blog,$UPYUN_PASSWORD v0.ftp.upyun.com; mirror -R -v ./public / --ignore-time --delete --parallel=4"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
